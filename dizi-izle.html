<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Dizi İzle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json">
    <script src="database.js"></script>

    <style>
        /* --- TEMEL AYARLAR --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        :root { 
            --brand-color: #E50914; 
            --bg-dark: #101010; 
            --sidebar-bg: #181818; 
            --glass-bg: rgba(20, 20, 20, 0.9); 
            --glass-form-bg: rgba(30, 30, 30, 0.6); 
            --blur: blur(20px); 
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6); 
        }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; overflow-y: auto; overflow-x: hidden; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #181818; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* --- NAVBAR STYLES --- */
        .navbar { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1200px; height: 65px; 
            background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; 
            display: flex; align-items: center; justify-content: space-between; padding: 0 25px; 
            z-index: 1000; transition: 0.3s; box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
        }
        .logo-text { color: var(--brand-color); font-size: 24px; font-weight: 900; letter-spacing: -0.5px; font-family: 'Arial Black', sans-serif; text-transform: uppercase; display: flex; align-items: center; text-shadow: 0 0 5px rgba(229, 9, 20, 0.3); cursor: pointer; }
        .version-badge { background: rgba(255,255,255,0.15); color: #aaa; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 8px; font-weight: normal; border: 1px solid rgba(255,255,255,0.1); letter-spacing: 0; font-family: sans-serif; text-shadow: none; }
        
        .nav-menu { display: flex; gap: 20px; margin-left: 30px; flex-grow: 1; }
        .nav-item { cursor: pointer; color: #aaa; font-weight: 500; font-size: 14px; transition: 0.2s; text-decoration: none; border: none !important; display: flex; align-items: center; gap: 6px; }
        .nav-item:hover { color: white; text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }
        
        /* PREMIUM STİLLERİ */
        .nav-menu .nav-item:last-child {
            color: #FFC107; font-weight: 900; text-shadow: 0 0 10px rgba(255, 193, 7, 0.5); padding: 8px 15px; border-radius: 20px; background: rgba(255, 193, 7, 0.1); border: 1px solid rgba(255, 193, 7, 0.3);
        }
        .nav-menu .nav-item:last-child i { color: #FFC107; filter: drop-shadow(0 0 5px rgba(255, 193, 7, 0.8)); }
        .nav-menu .nav-item:last-child:hover { color: #FFE082; background: rgba(255, 193, 7, 0.2); text-shadow: 0 0 20px rgba(255, 193, 7, 0.8); transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 193, 7, 0.4); }

        /* ARAMA KUTUSU (Genişlik Düzeltildi) */
        .search-container { display: flex; align-items: center; width: 40px; height: 40px; border-radius: 30px; background: transparent; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); overflow: hidden; position: relative; border: 1px solid transparent; cursor: pointer; padding: 0 10px; flex-shrink: 0; }
        /* BURADAKİ WIDTH DEĞERİ 160PX YAPILDI */
        .search-container:hover, .search-container.active { width: 160px; background: rgba(0, 0, 0, 0.6); border-color: rgba(255, 255, 255, 0.2); padding: 0 15px; cursor: default; }
        .search-icon-btn { font-size: 18px; flex-shrink: 0; color: var(--brand-color); filter: drop-shadow(0 0 2px var(--brand-color)); transition: 0.3s; margin-left: 8px; }
        .search-container:hover .search-icon-btn, .search-container.active .search-icon-btn { margin-left: 0; }
        .search-input { width: 0; opacity: 0; background: transparent; border: none; color: white; outline: none; font-size: 13px; transition: 0.3s; margin-left: 10px; }
        .search-container:hover .search-input, .search-container.active .search-input { width: 100%; opacity: 1; }
        .close-search { font-size: 16px; cursor: pointer; color: #aaa; padding-right: 10px; display: none; margin-left: auto; }
        .search-container.active .close-search { display: block; }

        /* HAMBURGER MENU */
        .menu-toggle { display: none; } 
        .mobile-menu-overlay, #mobileBackdrop { display: none; }
        .mobile-menu-overlay { position: fixed; top: 0; right: 0; width: 300px; max-width: 80%; height: 100%; background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-left: 1px solid rgba(255, 255, 255, 0.1); box-shadow: -5px 0 15px rgba(229, 9, 20, 0.3); z-index: 999; flex-direction: column; padding-top: 60px; transform: translateX(100%); transition: transform 0.3s ease-out; }
        .mobile-menu-overlay.open { transform: translateX(0); }
        .mobile-nav-menu { display: flex; flex-direction: column; gap: 0; text-align: left; padding: 20px 0; }
        .mobile-nav-menu .nav-item { font-size: 1.1rem; padding: 15px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: #ccc; transition: background 0.2s; }
        .mobile-nav-menu .nav-item:hover { background: rgba(229, 9, 20, 0.15); color: white; padding-left: 25px; }
        .mobile-nav-menu .nav-item:last-child { color: #FFC107; font-weight: 900; text-shadow: 0 0 10px rgba(255, 193, 7, 0.5); background: rgba(255, 193, 7, 0.05); border-bottom: 1px solid rgba(255, 193, 7, 0.2) !important; }
        .mobile-nav-menu .nav-item:last-child i { color: #FFC107; filter: drop-shadow(0 0 5px rgba(255, 193, 7, 0.8)); }
        .mobile-nav-menu .nav-item:last-child:hover { background: rgba(255, 193, 7, 0.15); color: #FFE082; padding-left: 25px; }

        /* CONTENT & PLAYER */
        .main-container { display: flex; min-height: 100vh; padding-top: 120px; max-width: 1600px; margin: 0 auto; gap: 20px; padding-bottom: 50px; }
        .content-area { flex: 3; min-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 0 20px; } 
        .series-title { display: none; }
        .episode-title { color: #fff; font-size: 1.5rem; font-weight: 800; text-shadow: 0 0 10px rgba(0,0,0,0.5); margin-top: 5px; text-align: center; }

        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); z-index: 1; }
        .video-js { position: absolute !important; top: 0; left: 0; width: 100% !important; height: 100% !important; border-radius: 15px; overflow: hidden; }
        .video-js .vjs-control-bar { z-index: 100 !important; bottom: 0; width: 100%; }
        .video-js .vjs-progress-control { z-index: 101 !important; cursor: pointer !important; }

        /* --- GÜNCELLENMİŞ DİL BUTONLARI STİLLERİ --- */
        .source-selector {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 800px; 
            justify-content: flex-start; 
            margin: -10px auto 15px auto; 
            padding: 0 20px; 
        }
        .source-btn {
            padding: 8px 15px; 
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 1; 
            pointer-events: auto;
        }
        /* Kaynak yoksa butonu devre dışı bırakma stili */
        .source-btn:disabled, .source-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: rgba(100, 100, 100, 0.1);
            border-color: rgba(100, 100, 100, 0.2);
        }
        .source-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--brand-color);
        }
        .source-btn.disabled:hover { 
            background: rgba(100, 100, 100, 0.1);
            border-color: rgba(100, 100, 100, 0.2);
        }
        .source-btn.active {
            background: var(--brand-color);
            border-color: var(--brand-color);
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.5);
            opacity: 1;
            pointer-events: auto;
        }

        /* Mobil için genişlik ayarı */
        @media (max-width: 1000px) {
            .source-selector {
                max-width: 94%;
                margin: 15px auto 15px auto;
                padding: 0 10px;
                justify-content: center; 
            }
            .source-btn {
                flex-grow: 1; 
                justify-content: center;
            }
        }
        /* SIDEBAR */
        .sidebar { flex: 1; background: var(--glass-form-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid rgba(255, 255, 255, 0.18); border-radius: 18px; box-shadow: var(--shadow); display: flex; flex-direction: column; min-width: 350px; max-width: 450px; height: 550px; position: sticky; top: 120px; }
        .sidebar-header { padding: 15px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.4); border-radius: 18px 18px 0 0; }
        .season-select { width: 100%; padding: 10px 15px; background: rgba(255, 255, 255, 0.1); border: 1px solid var(--brand-color); color: white; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; outline: none; transition: all 0.2s; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 20 20' fill='%23E50914'%3e%3cpath d='M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z'/%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 15px center; background-size: 1em; }
        .episode-list { flex-grow: 1; overflow-y: auto; padding: 0; }
        .episode-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); cursor: pointer; transition: 0.2s; }
        .episode-item.active { background: rgba(229, 9, 20, 0.2); border-left: 4px solid var(--brand-color); }
        .ep-num { font-size: 1.1rem; font-weight: bold; color: #888; margin-right: 15px; min-width: 25px; } 
        .ep-info { flex: 1; } 
        .ep-title { font-weight: 800; font-size: 1.1rem; color: #fff; margin-bottom: 2px; }
        .ep-desc { font-size: 0.75rem; color: #888; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .ep-play-icon { font-size: 1.7rem; color: white; margin-right: 20px; opacity: 0.5; transition: all 0.3s; filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.8)); transform: scale(0.8); background: transparent; order: unset; }
        .episode-item:hover .ep-play-icon { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 10px #fff); }

        .toast-notification {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(229, 9, 20, 0.95); color: white; padding: 12px 30px; border-radius: 30px;
            font-weight: bold; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            z-index: 9999; opacity: 0; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            pointer-events: none; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; gap: 10px;
        }
        .toast-notification.show { opacity: 1; bottom: 120px; }

        .suggestion-section-wrapper { width: 100%; display: flex; justify-content: center; padding: 50px 20px; margin-top: -50px; }
        .suggestion-section { width: 100%; max-width: 1000px; background: var(--glass-form-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid rgba(255, 255, 255, 0.18); border-radius: 18px; box-shadow: var(--shadow); padding: 30px; }
        .form-control { width: 100%; padding: 12px 15px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 10px; font-size: 0.95rem; transition: all 0.3s; }
        .form-control:focus { border-color: var(--brand-color); background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 0 1px var(--brand-color); }
        .season-select option, select.form-control option { background-color: var(--bg-dark); color: white; }
        .btn-submit { width: 100%; padding: 14px; background: var(--brand-color); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: background 0.2s, transform 0.1s; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(229, 9, 20, 0.4); }

        /* MOBİL RESPONSIVE */
        @media (max-width: 1000px) { 
            .navbar { top: 0; transform: none; width: 100%; left: 0; border-radius: 0; height: 60px; padding: 0 15px; background: #141414; backdrop-filter: none; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.8); } 
            .main-container { flex-direction: column; padding-top: 80px; padding-bottom: 20px; gap: 20px; } 
            .content-area { width: 100%; min-width: unset; padding: 0 15px; order: 1; } 
            .video-wrapper { width: 94% !important; margin: 0 auto; }
            .sidebar { height: 380px; width: calc(100% - 30px); margin: 0 15px; position: static; order: 2; border-left: none; } 
            .suggestion-section-wrapper { padding: 0 15px 50px 15px; margin-top: 0; }
            .menu-toggle { display: block !important; background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 5px; z-index: 1001; order: 3; margin-left: 10px; }
            .nav-menu { display: none; } 
            .search-container { order: 2; margin-left: auto; }
            .search-container.active { width: calc(100% - 140px); position: absolute; left: 70px; top: 5px; height: 50px; padding: 0 15px; }
            .episode-title { font-size: 1.5rem; }
        }
    </style>
</head>

    <script>
        // Global değişkenler
let currentEpisodeData = null;
let currentSeasonIndex = 0;
let currentEpisodeIndex = 0;
let player;

// YENİ: Kaynak butonlarının durumunu kontrol eden ve ayarlayan fonksiyon
function updateSourceButtons(epData) {
    const dublajBtn = document.getElementById('dublaj-btn');
    const altyaziBtn = document.getElementById('altyazi-btn');
    const sourceSelector = document.getElementById('source-buttons');
    
    // Geriye dönük uyumluluk: Eğer sadece 'source' varsa, dublaj_source olarak kabul et.
    const dublajSource = epData.dublaj_source || epData.source;
    const altyaziSource = epData.altyazi_source;
    
    // YENİ MANTIK: Sadece hem dublaj hem de altyazı kaynakları varsa butonları göster.
    if (dublajSource && altyaziSource) {
        sourceSelector.style.display = 'flex';
        
        // Dublaj butonu
        dublajBtn.classList.remove('disabled');
        dublajBtn.disabled = false;

        // Altyazı butonu
        altyaziBtn.classList.remove('disabled');
        altyaziBtn.disabled = false;

    } else {
        // İki kaynak da yoksa veya sadece biri varsa, butonları gizle.
        sourceSelector.style.display = 'none';
    }
}

// playEpisode fonksiyonu güncellendi: Hangi kaynağın oynatılacağına karar verir.
function playEpisode(ep, index, seasonIdx) {
    if(series) { updateSEO(series.title, ep.name, ep.desc || "Heyecan dolu yeni bölümü hemen izle."); }
    document.getElementById('episode-name').innerText = `${ep.name}`; 
    document.querySelectorAll('.episode-item').forEach(el => el.classList.remove('active'));
    const activeItem = document.getElementById(`ep-${index}`);
    if(activeItem) activeItem.classList.add('active');

    const lastEpisodeKey = 'last_ep_' + series.id;
    localStorage.setItem(lastEpisodeKey, `${seasonIdx}|${index}`);

    currentEpisodeData = ep;
    currentSeasonIndex = seasonIdx;
    currentEpisodeIndex = index;
    
    // YENİ: Kaynakları geriye dönük uyumlulukla al
    const dublajSource = ep.dublaj_source || ep.source;
    const altyaziSource = ep.altyazi_source;
    
    // YENİ MANTIK: Butonların görünürlüğünü ayarla
    updateSourceButtons(ep);

    let sourceType = '';
    let defaultSource = dublajSource || altyaziSource; // Öncelik dublaj, sonra altyazı, sonra source
    
    if (defaultSource === dublajSource) {
        sourceType = 'dublaj';
    } else if (defaultSource === altyaziSource) {
        sourceType = 'altyazi';
    }

    if (!defaultSource) {
        showToast('<i class="fas fa-exclamation-triangle"></i> Bu bölüm için kaynak bulunamadı!');
        if(player) { player.dispose(); player = null; }
        document.getElementById('video-container').innerHTML = ''; 
        document.getElementById('episode-name').innerText = `${ep.name} - Kaynak Yok`;
        return; 
    }
    
    // Mevcut kaynağı oynat ve butonu aktif et (Eğer butonlar görünürse)
    switchSource(sourceType, true); 
}

// switchSource fonksiyonu güncellendi: Sadece etkin butonlar ile çalışır.
function switchSource(type, isInitialLoad = false) {
    if (!currentEpisodeData) return;

    let url;
    let buttonId;
    
    // Geriye dönük uyumluluk kontrolü eklendi
    const dublajSource = currentEpisodeData.dublaj_source || currentEpisodeData.source;
    const altyaziSource = currentEpisodeData.altyazi_source;

    if (type === 'dublaj') {
        url = dublajSource;
        buttonId = 'dublaj-btn';
    } else if (type === 'altyazi') {
        url = altyaziSource;
        buttonId = 'altyazi-btn';
    } else {
        return; 
    }
    
    const targetButton = document.getElementById(buttonId);
    
    // Kaynak yoksa veya buton devre dışıysa, işlem yapma (Sadece iki buton varsa bu kontrol geçerlidir)
    if (!url || (targetButton && targetButton.classList.contains('disabled'))) {
         return;
    }


    // 2. Butonları güncelle (Sadece butonlar görünürse bu kısmı çalıştır)
    if(document.getElementById('source-buttons').style.display !== 'none') {
        document.querySelectorAll('.source-btn').forEach(btn => btn.classList.remove('active'));
        if(targetButton) targetButton.classList.add('active');
    }

    // 3. Oynatıcıyı yükle
    let resumeTime = 0;
    if (player && !isInitialLoad) {
        resumeTime = player.currentTime();
    }
    
    const uniqueEpKey = `resume_${series.id}_s${currentSeasonIndex}_e${currentEpisodeIndex}`;
    
    loadPlayer(url, uniqueEpKey, resumeTime, isInitialLoad);
}

// loadPlayer ve initVideoJS fonksiyonları aynı kaldı
function loadPlayer(url, storageKey, resumeTime = 0, isInitialLoad = false) {
    const container = document.getElementById('video-container');

    if(player) { player.dispose(); player = null; }
    container.innerHTML = ''; 
    
    const video = document.createElement('video');
    video.id = 'video-js-player';
    video.className = 'video-js vjs-default-skin vjs-big-play-centered';
    video.controls = true;
    video.playsInline = true;
    video.setAttribute('preload', 'auto');
    
    const source = document.createElement('source');
    source.src = url;
    source.type = 'application/x-mpegURL';
    video.appendChild(source);

    container.appendChild(video);
    
    let timeToResume = resumeTime;
    if (isInitialLoad && resumeTime === 0) {
        timeToResume = parseFloat(localStorage.getItem(storageKey)) || 0;
    }
    
    initVideoJS(video.id, storageKey, timeToResume); 
    
    if (player) { 
        player.play().catch(e => console.log("Oto oynatma engellendi:", e)); 
        if (!isInitialLoad && resumeTime === 0) {
            showToast('<i class="fas fa-sync"></i> Kaynak Değiştirildi');
        }
    }
}

function initVideoJS(videoId, storageKey, initialResumeTime = 0) {
    player = videojs(videoId, {
        fill: true,   
        responsive: true,
        playbackRates: [0.5, 1, 1.25, 1.5, 2], 
        html5: {
            vhs: { 
                overrideNative: true,
                maxBufferLength: 120, 
                maxSeekholeDuration: 5, 
                allowSeeksWithinBuffer: true,
            },
        }
    });
    player.hlsQualitySelector({ displayLabel: 'Kalite' });
    
    // Tamponlama Bildirimleri
    player.on('waiting', function() {
        if (!player.paused()) {
            showToast('<i class="fas fa-circle-notch fa-spin"></i> Yükleniyor...');
        }
    });

    player.on('playing', function() {
        const toast = document.getElementById('toast');
        if (!toast.innerHTML.includes('Kaldığınız yerden')) {
            toast.classList.remove('show');
        }
    });
    
    player.on('pause', function() {
        if(player.tech_.vhs && player.tech_.vhs.bandwidth) {
            player.tech_.vhs.seeking(false);
        }
    });

    // Zamanı kaydetme
    player.on('timeupdate', function() {
        if (!player.paused()) {
            localStorage.setItem(storageKey, player.currentTime());
        }
    });

    // YÜKLEME ZAMANI MANTIĞI
    player.on('loadedmetadata', function() {
        let savedTime = initialResumeTime; 

        if (savedTime === 0) {
             savedTime = parseFloat(localStorage.getItem(storageKey));
        }

        if (savedTime > 0 && savedTime < (player.duration() - 10)) {
            player.currentTime(savedTime); 
            const hours = Math.floor(savedTime / 3600);
            const minutes = Math.floor((savedTime % 3600) / 60);
            const seconds = Math.floor(savedTime % 60);
            let timeStr = hours > 0 ? `${hours} saat ${minutes} dakika` : `${minutes} dakika ${seconds} saniye`;
            
            if (initialResumeTime === 0) {
                showToast(`<i class="fas fa-history"></i> Kaldığınız yerden devam ediliyor (${timeStr})`);
            }
        }
    });
    
    player.on('ended', function() {
        localStorage.removeItem(storageKey);
    });
}
        
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false;
            if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
            if (e.ctrlKey && (e.keyCode == 'U'.charCodeAt(0) || e.keyCode == 'S'.charCodeAt(0))) return false;
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        const series = typeof DATABASE !== 'undefined' ? DATABASE.find(item => item.id === id) : null;

        function updateSEO(seriesName, episodeName, episodeDesc) {
            document.title = `${seriesName} - ${episodeName} İzle | Filmoloji`;
            let metaDesc = document.querySelector('meta[name="description"]');
            if (!metaDesc) {
                metaDesc = document.createElement('meta');
                metaDesc.name = "description";
                document.head.appendChild(metaDesc);
            }
            let cleanDesc = episodeDesc ? episodeDesc.substring(0, 150) + "..." : "Bu bölümü full HD kalitede izle.";
            metaDesc.content = `${seriesName} dizisinin ${episodeName} bölümünü kesintisiz, donmadan Full HD izle. Konusu: ${cleanDesc}`;
        }

        if(series) {
            document.title = series.title;
            const select = document.getElementById('season-select');
            
            series.seasons.forEach((s, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.innerText = s.name;
                select.appendChild(opt);
            });

            const lastEpisodeKey = 'last_ep_' + series.id; 
            let savedSeasonIndex = 0;
            let savedEpisodeIndex = 0;

            try {
                const savedData = localStorage.getItem(lastEpisodeKey);
                if (savedData) {
                    const parts = savedData.split('|');
                    savedSeasonIndex = parseInt(parts[0]);
                    savedEpisodeIndex = parseInt(parts[1]);
                }
            } catch (e) { console.error(e); }

            select.value = savedSeasonIndex;
            loadEpisodes(savedSeasonIndex);
            
            if(series.seasons[savedSeasonIndex] && series.seasons[savedSeasonIndex].episodes[savedEpisodeIndex]) {
                setTimeout(() => { 
                    playEpisode(series.seasons[savedSeasonIndex].episodes[savedEpisodeIndex], savedEpisodeIndex, savedSeasonIndex); 
                }, 500);
            }
        }

        function loadEpisodes(seasonIdx) {
            const list = document.getElementById('ep-list');
            list.innerHTML = '';
            if (!series || !series.seasons[seasonIdx]) return;
            series.seasons[seasonIdx].episodes.forEach((ep, index) => {
                const div = document.createElement('div');
                div.className = 'episode-item';
                div.id = `ep-${index}`;
                div.onclick = () => playEpisode(ep, index, seasonIdx);
                div.innerHTML = `<div class="ep-num">${index + 1}</div><div class="ep-play-icon"><i class="fas fa-play"></i></div><div class="ep-info"><div class="ep-title">${ep.name}</div><div class="ep-desc">${ep.desc || ''}</div></div>`;
                list.appendChild(div);
            });
        }

        navigator.serviceWorker.register('/service-worker.js')
            .then(registration => {
                console.log('PWA ServiceWorker kaydı başarılı.');
            })
            .catch(err => {
                console.log('PWA ServiceWorker kaydı başarısız:', err);
            });
    });
}

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerHTML = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 4000); 
        }

        function goToSuggestions() { 
            if (document.getElementById('mobileMenuOverlay').classList.contains('open') && window.innerWidth <= 1000) toggleMenu(); 
            document.getElementById('suggestions').scrollIntoView({ behavior: 'smooth' }); 
        }
        function openSearch() { 
            document.getElementById('searchBox').classList.add('active'); 
            document.getElementById('searchInput').focus(); 
            if (window.innerWidth <= 1000 && document.getElementById('mobileMenuOverlay').classList.contains('open')) toggleMenu(); 
        }
        function closeSearch() { 
            document.getElementById('searchBox').classList.remove('active'); 
            document.getElementById('searchInput').value = ''; 
        }
        function handleSearchRedirect(event) { 
            if (event.key === 'Enter') { 
                const query = document.getElementById('searchInput').value; 
                if (query) window.location.href = `index.html?search=${encodeURIComponent(query)}`; 
            } 
        }
        function toggleMenu() {
            const overlay = document.getElementById('mobileMenuOverlay');
            const menuIcon = document.getElementById('menuToggle').querySelector('i');
            const backdrop = document.getElementById('mobileBackdrop');
            if (window.innerWidth > 1000) return;
            const isOpen = overlay.classList.contains('open');
            if (isOpen) {
                overlay.classList.remove('open');
                menuIcon.className = 'fas fa-bars';
                document.body.style.overflow = 'auto'; 
                setTimeout(() => { backdrop.style.display = 'none'; overlay.style.display = 'none'; }, 300); 
            } else {
                backdrop.style.display = 'block';
                overlay.style.display = 'flex';
                setTimeout(() => { overlay.classList.add('open'); }, 10); 
                menuIcon.className = 'fas fa-times'; 
                document.body.style.overflow = 'hidden'; 
            }
        }
        
        // --- İSTEK & ÖNERİ FORMU GÖNDERİMİ ---
async function submitSuggestion(event) {
    event.preventDefault(); // Sayfanın yönlendirilmesini engelle
    
    const form = event.target;
    const submitButton = form.querySelector('.btn-submit');
    const originalButtonText = submitButton.innerHTML;

    // Gönderim sırasında butonu devre dışı bırak ve yükleniyor animasyonu göster
    submitButton.disabled = true;
    submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gönderiliyor...';

    try {
        const response = await fetch(form.action, {
            method: form.method,
            body: new FormData(form),
            headers: {
                'Accept': 'application/json'
            }
        });

        if (response.ok) {
            // Başarılı gönderim
            showToast('<i class="fas fa-check-circle" style="color: #4CAF50;"></i> İsteğiniz/Öneriniz Başarıyla Alındı!');
            form.reset(); // Form alanlarını temizle
        } else {
            // Formspree'den gelen hata
            showToast('<i class="fas fa-exclamation-triangle" style="color: #FFC107;"></i> Gönderimde Hata Oluştu. Tekrar Deneyin.');
        }

    } catch (error) {
        // Ağ veya fetch hatası
        console.error('Gönderim Hatası:', error);
        showToast('<i class="fas fa-exclamation-circle" style="color: #F44336;"></i> Sunucuya Erişilemedi. Lütfen daha sonra tekrar deneyin.');
    } finally {
        // Butonu eski haline getir ve etkinleştir
        submitButton.disabled = false;
        submitButton.innerHTML = originalButtonText;
    }
}

        document.addEventListener('keydown', function(event) {
            if (!player || document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
            const key = event.key.toLowerCase();
            switch(key) {
                case ' ': case 'k': 
                    event.preventDefault(); 
                    if (player.paused()) { player.play(); showToast('<i class="fas fa-play"></i> Oynatılıyor'); } 
                    else { player.pause(); showToast('<i class="fas fa-pause"></i> Duraklatıldı'); }
                    break;
                case 'f': 
                    if (player.isFullscreen()) player.exitFullscreen(); else player.requestFullscreen();
                    break;
                case 'm': 
                    player.muted(!player.muted());
                    if(player.muted()) showToast('<i class="fas fa-volume-mute"></i> Sessiz'); else showToast('<i class="fas fa-volume-up"></i> Ses Açık');
                    break;
                // Klavye kısayolları 10 saniyede kaldı
                case 'arrowright': player.currentTime(player.currentTime() + 10); showToast('<i class="fas fa-forward"></i> +10 Sn'); break;
                case 'arrowleft': player.currentTime(player.currentTime() - 10); showToast('<i class="fas fa-backward"></i> -10 Sn'); break;
                case 'arrowup': event.preventDefault(); let volUp = player.volume() + 0.1; if(volUp > 1) volUp = 1; player.volume(volUp); showToast(`<i class="fas fa-volume-up"></i> %${Math.round(volUp*100)}`); break;
                case 'arrowdown': event.preventDefault(); let volDown = player.volume() - 0.1; if(volDown < 0) volDown = 0; player.volume(volDown); showToast(`<i class="fas fa-volume-down"></i> %${Math.round(volDown*100)}`); break;
            }
        });
    </script>
