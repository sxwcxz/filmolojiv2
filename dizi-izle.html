<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINEO. | Dizi İzleniyor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #fff; --grey: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Üst Menü */
        .nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); position: absolute; width: 100%; top: 0; z-index: 100; transition: opacity 0.3s; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -2px; color: #fff; text-decoration: none; }
        .btn-back { color: #fff; text-decoration: none; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; opacity: 0.8; transition: 0.3s; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(5px); }
        .btn-back:hover { opacity: 1; background: rgba(255,255,255,0.2); }

        /* Oynatıcı Alanı */
        .player-section { width: 100%; min-height: 100vh; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 80px; padding-bottom: 50px; }
        
        .video-wrapper { position: relative; width: 100%; max-width: 1200px; aspect-ratio: 16 / 9; background: #050505; box-shadow: 0 20px 50px rgba(0,0,0,0.9); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); display: none; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 10; background: #000; }
        
        .player-placeholder { width: 100%; max-width: 1200px; aspect-ratio: 16 / 9; background: #0a0a0a; border-radius: 12px; border: 1px dashed rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; color: #888; font-weight: 600; flex-direction: column; gap: 15px; }

        /* Gelişmiş Sunucu Paneli */
        .servers-container { max-width: 1200px; width: 100%; margin-top: 20px; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px; display: none; }
        .servers-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .servers-title { font-size: 14px; font-weight: 800; color: #aaa; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px; }
        
        .servers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .server-btn { background: #111; border: 1px solid #222; color: #888; padding: 12px 15px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between; }
        .server-btn:hover { background: #1a1a1a; color: #ddd; border-color: #333; transform: translateY(-2px); }
        .server-btn.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .server-btn i { font-size: 14px; opacity: 0.7; }
        .server-btn.active i { color: #000; opacity: 1; }

        /* Sezon ve Bölüm Seçici (Dizilere Özel) */
        .seasons-section { max-width: 1200px; margin: 30px auto 50px; padding: 0 10px; width: 100%; }
        .section-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .season-select { background: #111; color: #fff; border: 1px solid #333; padding: 10px 20px; border-radius: 8px; font-size: 15px; font-weight: 700; outline: none; cursor: pointer; }
        
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 20px; }
        .ep-card { background: rgba(25,25,25,0.8); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 15px; }
        .ep-card:hover { background: #222; transform: translateY(-3px); border-color: rgba(255,255,255,0.2); }
        .ep-card.active { background: #fff; color: #000; }
        .ep-card.active .ep-num { background: #000; color: #fff; }
        .ep-card.active .ep-title { color: #000; }
        
        .ep-num { background: rgba(255,255,255,0.1); width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; flex-shrink: 0; }
        .ep-title { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
        .ep-date { font-size: 11px; color: #888; font-weight: 600; }

        #error-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff4d4d; font-weight: bold; text-align: center; display: none; z-index: 1; }

        @media (max-width: 768px) {
            .video-wrapper, .player-placeholder { border-radius: 0; }
            .servers-container { padding: 15px 10px; border-radius: 0; border-left: none; border-right: none; }
            .servers-grid { grid-template-columns: repeat(2, 1fr); }
            .section-title { flex-direction: column; align-items: flex-start; gap: 15px; }
        }
    </style>
</head>
<body>

    <nav class="nav" id="top-nav">
        <a href="javascript:history.back()" class="btn-back"><i class="fas fa-arrow-left"></i> Detaylara Dön</a>
        <a href="index.html" class="logo">SINEO.</a>
        <div style="width: 100px;"></div>
    </nav>

    <div class="player-section">
        
        <div class="player-placeholder" id="player-placeholder">
            <i class="fas fa-tv" style="font-size: 50px; opacity: 0.3; margin-bottom: 10px;"></i>
            <span id="placeholder-title">Dizi Yükleniyor...</span>
            <span style="font-size: 13px; font-weight: 400; color: #666;">İzlemek için aşağıdan bir bölüm seçin.</span>
        </div>

        <div class="video-wrapper" id="video-wrapper">
            <div id="error-msg">Medya yüklenemedi. Alternatif sunucu seçin.</div>
            
            <iframe id="video-player" frameborder="0" scrolling="no" allowfullscreen="allowfullscreen" webkitallowfullscreen="true" mozallowfullscreen="true" msallowfullscreen="true" oallowfullscreen="true" allow="autoplay; fullscreen; picture-in-picture; encrypted-media"></iframe>
            
        </div>
        
        <div class="servers-container" id="server-panel">
            <div class="servers-header">
                <div class="servers-title"><i class="fas fa-satellite-dish"></i> Alternatif Kaynaklar (<span id="current-ep-badge">S1 E1</span>)</div>
            </div>
            <div class="servers-grid" id="servers-grid">
                </div>
        </div>

        <div class="seasons-section">
            <div class="section-title">
                <span id="m-title">Bölümler</span>
                <select class="season-select" id="season-selector" onchange="loadEpisodes(this.value)">
                    </select>
            </div>
            <div class="episodes-grid" id="episodes-grid">
                </div>
        </div>

    </div>

    <script>
        const API_KEY = 'f709a1ae'; 
        const urlParams = new URLSearchParams(window.location.search);
        const seriesID = urlParams.get('id');

        let totalSeasons = 1;
        let activeSeason = 1;
        let activeEpisode = 1;
        let activeServerIndex = 0; 

        const serverTemplates = [
            { id: 1, name: "VidSrc.me", tag: "Önerilen", icon: "fa-play-circle", getUrl: (id, s, e) => `https://vidsrc.me/embed/tv?imdb=${id}&season=${s}&episode=${e}` },
            { id: 2, name: "VidLink", tag: "Hızlı", icon: "fa-bolt", getUrl: (id, s, e) => `https://vidlink.pro/tv/${id}/${s}/${e}` },
            { id: 3, name: "AutoEmbed", tag: "Stabil", icon: "fa-shield-alt", getUrl: (id, s, e) => `https://autoembed.to/tv/imdb/${id}-${s}-${e}` },
            { id: 4, name: "MultiEmbed", tag: "Yedek 1", icon: "fa-server", getUrl: (id, s, e) => `https://multiembed.mov/?video_id=${id}&s=${s}&e=${e}` },
            { id: 5, name: "VidSrc.to", tag: "Yedek 2", icon: "fa-cloud", getUrl: (id, s, e) => `https://vidsrc.to/embed/tv/${id}/${s}/${e}` },
            { id: 6, name: "VidSrc.cc", tag: "Yedek 3", icon: "fa-database", getUrl: (id, s, e) => `https://vidsrc.cc/v2/embed/tv/${id}/${s}/${e}` },
            { id: 7, name: "VidSrc.pro", tag: "Yedek 4", icon: "fa-hdd", getUrl: (id, s, e) => `https://vidsrc.pro/embed/tv/${id}/${s}/${e}` },
            { id: 8, name: "Smashy", tag: "Alternatif", icon: "fa-tv", getUrl: (id, s, e) => `https://embed.smashystream.com/playere.php?imdb=${id}&season=${s}&episode=${e}` },
            { id: 9, name: "Noxx", tag: "Yedek 5", icon: "fa-archive", getUrl: (id, s, e) => `https://noxx.to/embed/tv/${id}/${s}/${e}` },
            { id: 10, name: "Club API", tag: "Mobil", icon: "fa-mobile-alt", getUrl: (id, s, e) => `https://moviesapi.club/tv/${id}-${s}-${e}` }
        ];

        async function initPage() {
            if (!seriesID) {
                document.getElementById('placeholder-title').innerText = "Hata: Dizi ID'si Yok.";
                return;
            }

            try {
                const res = await fetch(`https://www.omdbapi.com/?i=${seriesID}&apikey=${API_KEY}`);
                const data = await res.json();

                if (data.Response === "True") {
                    document.getElementById('m-title').innerText = data.Title;
                    document.getElementById('placeholder-title').innerText = data.Title;
                    
                    totalSeasons = parseInt(data.totalSeasons) || 1;
                    
                    const select = document.getElementById('season-selector');
                    for (let i = 1; i <= totalSeasons; i++) {
                        select.innerHTML += `<option value="${i}">Sezon ${i}</option>`;
                    }

                    loadEpisodes(1);
                }
            } catch (err) {}
        }

        window.loadEpisodes = async function(seasonNum) {
            activeSeason = seasonNum;
            const grid = document.getElementById('episodes-grid');
            grid.innerHTML = '<div style="color:#888; grid-column:1/-1;">Bölümler yükleniyor...</div>';

            try {
                const res = await fetch(`https://www.omdbapi.com/?i=${seriesID}&Season=${seasonNum}&apikey=${API_KEY}`);
                const data = await res.json();

                grid.innerHTML = '';
                if (data.Response === "True" && data.Episodes) {
                    data.Episodes.forEach(ep => {
                        grid.innerHTML += `
                            <div class="ep-card" id="ep-card-${ep.Episode}" onclick="playEpisode(${ep.Episode}, this)">
                                <div class="ep-num">${ep.Episode}</div>
                                <div style="overflow:hidden;">
                                    <div class="ep-title">${ep.Title}</div>
                                    <div class="ep-date">${ep.Released !== "N/A" ? ep.Released : "Tarih Yok"}</div>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    grid.innerHTML = '<div style="color:#ff4d4d; grid-column:1/-1;">Bu sezon için bölüm verisi bulunamadı.</div>';
                }
            } catch (err) {}
        }

        window.playEpisode = function(epNum, cardElement) {
            activeEpisode = epNum;
            
            document.querySelectorAll('.ep-card').forEach(c => c.classList.remove('active'));
            if(cardElement) cardElement.classList.add('active');

            document.getElementById('current-ep-badge').innerText = `S${activeSeason} E${activeEpisode}`;

            document.getElementById('player-placeholder').style.display = 'none';
            document.getElementById('video-wrapper').style.display = 'block';
            document.getElementById('server-panel').style.display = 'block';

            renderServerButtons();

            document.getElementById('video-wrapper').scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function renderServerButtons() {
            const grid = document.getElementById('servers-grid');
            grid.innerHTML = ''; 
            
            serverTemplates.forEach((srv, index) => {
                const isActive = index === activeServerIndex ? 'active' : '';
                grid.innerHTML += `
                    <button class="server-btn ${isActive}" onclick="changeServer(${index}, this)">
                        <span><i class="fas ${srv.icon}" style="margin-right: 8px;"></i> ${srv.name}</span>
                        <span style="font-size: 10px; opacity: 0.5;">${srv.tag}</span>
                    </button>
                `;
            });

            const targetUrl = serverTemplates[activeServerIndex].getUrl(seriesID, activeSeason, activeEpisode);
            document.getElementById('video-player').src = targetUrl;
        }

        window.changeServer = function(index, btnElement) {
            if (!seriesID) return;
            activeServerIndex = index; 
            
            const targetUrl = serverTemplates[activeServerIndex].getUrl(seriesID, activeSeason, activeEpisode);
            document.getElementById('video-player').src = targetUrl;
            
            const buttons = document.querySelectorAll('.server-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        };

        initPage();
    </script>
</body>
</html>
