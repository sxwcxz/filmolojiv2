<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yönetici Paneli - Filmoloji</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
    <script src="auth.js"></script>
    <script>
         checkAuth('admin'); // 'admin' yazması zorunlu
    </script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0a0a0a; color: white; min-height: 100vh; display: flex; flex-direction: column; }

        /* SIDEBAR */
        .sidebar {
            width: 250px; height: 100vh; background: #111; border-right: 1px solid #222;
            position: fixed; left: 0; top: 0; display: flex; flex-direction: column; padding: 20px;
        }
        .logo { font-size: 1.5rem; font-weight: 900; color: #E50914; margin-bottom: 40px; letter-spacing: -1px; }
        
        .menu-item {
            padding: 15px; color: #aaa; text-decoration: none; font-weight: 600;
            display: flex; align-items: center; gap: 10px; border-radius: 8px; transition: 0.3s; margin-bottom: 5px;
        }
        .menu-item:hover, .menu-item.active { background: #222; color: white; }
        .menu-item i { width: 20px; text-align: center; }
        
        .logout-btn {
            margin-top: auto; background: rgba(229, 9, 20, 0.1); color: #E50914; border: 1px solid rgba(229, 9, 20, 0.3);
        }
        .logout-btn:hover { background: #E50914; color: white; }

        /* MAIN CONTENT */
        .main { margin-left: 250px; padding: 40px; width: calc(100% - 250px); }
        
        h1 { font-size: 2rem; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }

        /* KARTLAR */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: #161616; padding: 20px; border-radius: 12px; border: 1px solid #222; }
        .stat-number { font-size: 2rem; font-weight: bold; color: white; }
        .stat-label { color: #777; font-size: 0.9rem; margin-top: 5px; }

        .info-box { 
            background: rgba(255,255,255,0.03); padding: 25px; border-radius: 12px; border: 1px solid #222; 
            line-height: 1.6; color: #ccc;
        }
        .info-box strong { color: #E50914; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px; }
            .logo, .menu-item span { display: none; }
            .main { margin-left: 70px; padding: 20px; width: calc(100% - 70px); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">Filmoloji</div>
        
        <a href="#" class="menu-item active"><i class="fas fa-tachometer-alt"></i> <span>Panel</span></a>
        <a href="https://formspree.io/forms" target="_blank" class="menu-item"><i class="fas fa-envelope"></i> <span>Mesajlar</span></a>
        <a href="index.html" class="menu-item"><i class="fas fa-globe"></i> <span>Siteye Git</span></a>
        
        <button onclick="doLogout()" class="menu-item logout-btn" style="cursor:pointer; border:none; width:100%; text-align:left;">
            <i class="fas fa-sign-out-alt"></i> <span>Çıkış Yap</span>
        </button>
    </div>

    <div class="main">
        <h1>Yönetici Paneli</h1>
        <p class="subtitle">Hoş geldin Admin, sistem durumu aşağıdadır.</p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="filmCount">...</div>
                <div class="stat-label">Toplam İçerik</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" style="color:#46d369;">Aktif</div>
                <div class="stat-label">Sunucu Durumu</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" style="color:#E50914;">Güvenli</div>
                <div class="stat-label">Yönetici Erişimi</div>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script>
        // İçerik Sayısını Hesapla
        window.onload = async function() {
            let count = 0;
            
            // 1. JS Dosyasından Say
            if (typeof DATABASE !== 'undefined') {
                count += DATABASE.length;
            }
            
            // 2. JSON Dosyasından Say (Varsa)
            try {
                const response = await fetch('database.json');
                if(response.ok) {
                    const jsonMovies = await response.json();
                    count += jsonMovies.length;
                }
            } catch (e) {}

            document.getElementById('filmCount').innerText = count;
        };
    </script>

</body>
</html>
