<!DOCTYPE html>
<html lang="tr" oncontextmenu="return false;" onkeydown="disableKeys(event)">
<head>
    <meta charset="UTF-8">
    <title>Canlı TV İzle | Filmoloji</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json">

    <style>
        /* --- CSS STİLLERİ (Önceki Sürümlerden Alınmıştır) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        :root { 
            --brand-color: #E50914; 
            --bg-dark: #101010; 
            --sidebar-bg: #181818; 
            --glass-bg: rgba(20, 20, 20, 0.9); 
            --glass-form-bg: rgba(30, 30, 30, 0.6); 
            --blur: blur(20px); 
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6); 
        }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; overflow-y: auto; overflow-x: hidden; }
        
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #181818; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* --- NAVBAR STYLES --- */
        .navbar { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 1200px; height: 65px; 
            background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px; 
            display: flex; align-items: center; justify-content: space-between; padding: 0 25px; 
            z-index: 1000; transition: 0.3s; box-shadow: 0 10px 40px rgba(0,0,0,0.5); 
        }
        
        .logo-text { 
            color: var(--brand-color); 
            font-size: 24px; 
            font-weight: 900; 
            letter-spacing: -0.5px; 
            font-family: 'Arial Black', sans-serif; 
            text-transform: uppercase; 
            display: flex; 
            align-items: center; 
            text-shadow: 0 0 5px rgba(229, 9, 20, 0.3); 
            cursor: pointer; 
            gap: 10px;
        }
        
        /* CANLI YAYIN NOKTASI (LIVE DOT) STİLİ */
        .live-dot {
            width: 10px;
            height: 10px;
            background-color: #f00; /* Kırmızı renk */
            border-radius: 50%;
            box-shadow: 0 0 5px #f00, 0 0 10px #f00;
            animation: blinker 1.5s linear infinite; /* Yanıp sönme animasyonu */
        }
        
        @keyframes blinker {
            50% { opacity: 0; }
        }

        .version-badge { display: none; }
        
        .nav-menu { display: flex; gap: 20px; margin-left: 30px; flex-grow: 1; }
        .nav-item { cursor: pointer; color: #aaa; font-weight: 500; font-size: 14px; transition: 0.2s; text-decoration: none; border: none !important; display: flex; align-items: center; gap: 6px; }
        .nav-item:hover { color: white; text-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }
        
        /* PREMIUM STİLLERİ */
        .nav-menu .nav-item:last-child {
            color: #FFC107; font-weight: 900; text-shadow: 0 0 10px rgba(255, 193, 7, 0.5); padding: 8px 15px; border-radius: 20px; background: rgba(255, 193, 7, 0.1); border: 1px solid rgba(255, 193, 7, 0.3);
        }
        .nav-menu .nav-item:last-child i { color: #FFC107; filter: drop-shadow(0 0 5px rgba(255, 193, 7, 0.8)); }
        .nav-menu .nav-item:last-child:hover { color: #FFE082; background: rgba(255, 193, 7, 0.2); text-shadow: 0 0 20px rgba(255, 193, 7, 0.8); transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 193, 7, 0.4); }

        /* ARAMA KUTUSU */
        .search-container { display: flex; align-items: center; width: 40px; height: 40px; border-radius: 30px; background: transparent; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); overflow: hidden; position: relative; border: 1px solid transparent; cursor: pointer; padding: 0 10px; flex-shrink: 0; }
        .search-container:hover, .search-container.active { width: 160px; background: rgba(0, 0, 0, 0.6); border-color: rgba(255, 255, 255, 0.2); padding: 0 15px; cursor: default; }
        .search-icon-btn { font-size: 18px; flex-shrink: 0; color: var(--brand-color); filter: drop-shadow(0 0 2px var(--brand-color)); transition: 0.3s; margin-left: 8px; }
        .search-container:hover .search-icon-btn, .search-container.active .search-icon-btn { margin-left: 0; }
        .search-input { width: 0; opacity: 0; background: transparent; border: none; color: white; outline: none; font-size: 13px; transition: 0.3s; margin-left: 10px; }
        .search-container:hover .search-input, .search-container.active .search-input { width: 100%; opacity: 1; }
        .close-search { font-size: 16px; cursor: pointer; color: #aaa; padding-right: 10px; display: none; margin-left: auto; }
        .search-container.active .close-search { display: block; }

        /* HAMBURGER MENU */
        .menu-toggle { display: none; } 
        .mobile-menu-overlay, #mobileBackdrop { display: none; }
        .mobile-menu-overlay { position: fixed; top: 0; right: 0; width: 300px; max-width: 80%; height: 100%; background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-left: 1px solid rgba(255, 255, 255, 0.1); box-shadow: -5px 0 15px rgba(229, 9, 20, 0.3); z-index: 999; flex-direction: column; padding-top: 60px; transform: translateX(100%); transition: transform 0.3s ease-out; }
        .mobile-menu-overlay.open { transform: translateX(0); }
        .mobile-nav-menu { display: flex; flex-direction: column; gap: 0; text-align: left; padding: 20px 0; }
        .mobile-nav-menu .nav-item { font-size: 1.1rem; padding: 15px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: #ccc; transition: background 0.2s; }
        .mobile-nav-menu .nav-item:hover { background: rgba(229, 9, 20, 0.15); color: white; padding-left: 25px; }
        .mobile-nav-menu .nav-item:last-child { color: #FFC107; font-weight: 900; text-shadow: 0 0 10px rgba(255, 193, 7, 0.5); background: rgba(255, 193, 7, 0.05); border-bottom: 1px solid rgba(255, 193, 7, 0.2) !important; }
        .mobile-nav-menu .nav-item:last-child i { color: #FFC107; filter: drop-shadow(0 0 5px rgba(255, 193, 7, 0.8)); }
        .mobile-nav-menu .nav-item:last-child:hover { background: rgba(255, 193, 7, 0.15); color: #FFE082; padding-left: 25px; }

        /* CONTENT & PLAYER (MASAÜSTÜ) */
        .main-container { display: flex; min-height: 100vh; padding-top: 120px; max-width: 1600px; margin: 0 auto; gap: 20px; padding-bottom: 50px; }
        .content-area { flex: 3; min-width: 600px; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 0 20px; } 
        .series-title { color: #fff; font-size: 1.5rem; font-weight: 800; text-shadow: 0 0 10px rgba(0,0,0,0.5); margin-top: 5px; text-align: center; }
        .episode-title { color: #aaa; font-size: 1.1rem; font-weight: 500; text-shadow: none; margin-top: 0; text-align: center; }

        .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background-color: #000; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); z-index: 1; }
        .video-js { position: absolute !important; top: 0; left: 0; width: 100% !important; height: 100% !important; border-radius: 15px; overflow: hidden; }
        .video-js .vjs-control-bar { z-index: 100 !important; bottom: 0; width: 100%; }

        /* KAYNAK BUTONLARI GİZLENİR (M3U'da gereksiz) */
        .source-selector { display: none !important; } 

        /* SIDEBAR (KANAL LİSTESİ - MASAÜSTÜ) */
        .sidebar { flex: 1; background: var(--glass-form-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid rgba(255, 255, 255, 0.18); border-radius: 18px; box-shadow: var(--shadow); display: flex; flex-direction: column; min-width: 350px; max-width: 450px; height: 550px; /* Sabit Masaüstü Yüksekliği */ position: sticky; top: 120px; }
        .sidebar-header { padding: 15px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.4); border-radius: 18px 18px 0 0; }
        
        #season-select { display: none; }
        .sidebar-header h3 { margin: 0; color: white; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }

        .episode-list { flex-grow: 1; overflow-y: auto; padding: 0; }
        
        /* M3U KANAL ÖĞESİ STİLİ */
        .channel-item { 
            display: flex; 
            align-items: center; 
            padding: 12px 15px; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
            cursor: pointer; 
            transition: 0.2s; 
            color: white; 
        }
        .channel-item:hover { 
            background: rgba(229, 9, 20, 0.1); 
        }
        .channel-item.active { 
            background: rgba(229, 9, 20, 0.3); 
            border-left: 4px solid var(--brand-color); 
        }

        /* M3U Logo Stilleri (45px) */
        .channel-logo { 
            width: 45px; 
            height: 45px; 
            margin-right: 15px; 
            object-fit: contain; 
            border-radius: 8px; 
            padding: 3px;
            background: rgba(255, 255, 255, 0.1);
        }

        .channel-name { 
            font-weight: 600; 
            font-size: 1.1rem; 
            color: #fff; 
            flex: 1; 
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Dizi listesindeki gereksiz elementler gizlendi */
        .ep-num, .ep-desc, .ep-play-icon { display: none; } 
        #loading-message { padding: 20px; text-align: center; color: #ccc; }

        /* TOAST VE İSTEK KUTUSU STİLLERİ */
        .toast-notification {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: rgba(229, 9, 20, 0.95); color: white; padding: 12px 30px; border-radius: 30px;
            font-weight: bold; font-size: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            z-index: 9999; opacity: 0; transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            pointer-events: none; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; gap: 10px;
        }
        .toast-notification.show { opacity: 1; bottom: 120px; }

        .suggestion-section-wrapper { width: 100%; display: flex; justify-content: center; padding: 50px 20px; margin-top: -50px; }
        .suggestion-section { width: 100%; max-width: 1000px; background: var(--glass-form-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid rgba(255, 255, 255, 0.18); border-radius: 18px; box-shadow: var(--shadow); padding: 30px; }
        .form-control { width: 100%; padding: 12px 15px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 10px; font-size: 0.95rem; transition: all 0.3s; }
        .form-control:focus { border-color: var(--brand-color); background: rgba(0, 0, 0, 0.6); box-shadow: 0 0 0 1px var(--brand-color); }
        .season-select option, select.form-control option { background-color: var(--bg-dark); color: white; }
        .btn-submit { width: 100%; padding: 14px; background: var(--brand-color); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: background 0.2s, transform 0.1s; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(229, 9, 20, 0.4); }

        /* MOBİL RESPONSIVE */
        @media (max-width: 1000px) { 
            .navbar { top: 0; transform: none; width: 100%; left: 0; border-radius: 0; height: 60px; padding: 0 15px; background: #141414; backdrop-filter: none; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.8); } 
            .main-container { flex-direction: column; padding-top: 80px; padding-bottom: 20px; gap: 20px; } 
            .content-area { width: 100%; min-width: unset; padding: 0 15px; order: 1; } 
            .video-wrapper { width: 94% !important; margin: 0 auto; }
            
            /* SİDEBAR YÜKSEKLİK AYARI */
            .sidebar { 
                width: calc(100% - 30px); 
                margin: 0 15px; 
                position: static; 
                order: 2; 
                border-left: none; 
                
                /* Burası Mobil Yüksekliği Kontrol Eder */
                height: 250px; 
                max-height: 40vh; 
            } 
            
            .suggestion-section-wrapper { padding: 0 15px 50px 15px; margin-top: 0; }
            .menu-toggle { display: block !important; background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 5px; z-index: 1001; order: 3; margin-left: 10px; }
            .nav-menu { display: none; } 
            .search-container { order: 2; margin-left: auto; }
            .search-container.active { width: calc(100% - 140px); position: absolute; left: 70px; top: 5px; height: 50px; padding: 0 15px; }
            .series-title { font-size: 1.5rem; }
            .episode-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

        <div class="logo-container" onclick="window.location.href='index.html'">
            <div class="logo-text">
                Filmoloji 
                <span class="live-dot"></span> </div>
        </div>
        <div class="nav-menu" id="desktop-nav-menu">

    <div class="mobile-menu-overlay" id="mobileMenuOverlay">

    <div class="main-container">
        <div class="content-area">
            <div class="playing-info">
                <div class="series-title" id="series-name">Canlı TV Yayınları</div>
                <div class="episode-title" id="channel-name">Yükleniyor...</div>

            <div class="video-wrapper">
                 <video
                    id="video-js-player"

        <div class="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-list-ul"></i> Canlı Kanal Listesi</h3>
                <select id="season-select" class="season-select" style="display: none;"></select>
            </div>
            <div id="channel-list" class="episode-list">
                <p id="loading-message">Kanal listesi yükleniyor...</p>
            </div>
        </div>
    </div>

    <div id="toast" class="toast-notification"></div>
    
    <div class="suggestion-section-wrapper">
        <div class="suggestion-section" id="suggestions">
            <div class="suggestion-box">
                <h3><i class="fas fa-paper-plane"></i> İstek & Öneri Kutusu</h3>
                <form action="https://formspree.io/f/xblnrgzw" method="POST" id="suggestionForm" onsubmit="submitSuggestion(event)">
                    <div class="form-group"><input type="text" name="Gonderen" class="form-control" placeholder="Adınız (İsteğe bağlı)"></div>
                    <div class="form-group">
                        <select name="Konu" class="form-control">
                            <option>Yayın Hatası</option>
                            <option>Yeni Kanal İsteği</option>

                        </select>
                    </div>
                    <div class="form-group"><textarea name="Mesaj" class="form-control" placeholder="Mesajınızı buraya yazın..." required></textarea></div>
                    <button type="submit" class="btn-submit">GÖNDER</button>

    </div>
    
    <script src="https://vjs.zencdn.net/8.10.0/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-quality-levels/dist/videojs-contrib-quality-levels.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-hls-quality-selector/dist/videojs-hls-quality-selector.min.js"></script>
    
    <script src="auth.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
        // !!! YETKİLENDİRME KONTROLÜ EKLENDİ !!!
        if (typeof checkAuth === 'function') {
            checkAuth('user');
        } else {
            console.error("Yetkilendirme fonksiyonu (checkAuth) yüklenemedi. auth.js dosyasını kontrol edin.");
        }
        
        loadM3UFile(M3U_FILE_NAME);
        seriesNameDisplay.textContent = "Canlı TV Yayınları";
    });
        // M3U dosyasının adı
        const M3U_FILE_NAME = 'tv.m3u'; 
        
        let player;
        let allChannels = [];
        let currentChannelIndex = -1;

        const channelListDiv = document.getElementById('channel-list');
        const channelNameDisplay = document.getElementById('channel-name');
        const loadingMessage = document.getElementById('loading-message');
        const seriesNameDisplay = document.getElementById('series-name');
        
        // Geliştirici araçlarını engelleyen fonksiyon (Body tag'ine eklenmiştir)
        function disableKeys(e) {
            // F12, Ctrl+Shift+I, Ctrl+U, Ctrl+S, Ctrl+P gibi tuş kombinasyonlarını engelle
            if (e.key === 'F12' || 
                (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || 
                (e.ctrlKey && e.key === 'u') || 
                (e.ctrlKey && e.key === 's') ||
                (e.ctrlKey && e.key === 'p')) {
                e.preventDefault();
                showToast('<i class="fas fa-lock"></i> İnceleme ve Kaydetme Engellendi!');
                return false;
            }
        }
        
        // Tarayıcı konsol kontrolü (Yönlendirme veya uyarı için)
        (function checkConsole() {
            let threshold = 160; // Konsol açılınca pencere boyutundaki tipik değişim
            let devtools = false;
            let width = window.outerWidth;
            let height = window.outerHeight;
            
            // Boyut değişimi algılama
            if (width - window.innerWidth > threshold || height - window.innerHeight > threshold) {
                devtools = true;
            }
            
            // Console.log ile breakpoint koyma hilesi
            const func = function() {
                if (devtools) {
                    // Konsol açıldıysa, kullanıcıyı uyar veya başka bir sayfaya yönlendir
                    // Örneğin: window.location.replace("hata_sayfasi.html");
                    console.log("%c⚠️ İNCELEME GİRİŞİMİ ALGILANDI", "font-size: 20px; color: red;");
                }
                setTimeout(func, 1000);
            };
            func();
        })();


        document.addEventListener('DOMContentLoaded', () => {
            loadM3UFile(M3U_FILE_NAME);
            seriesNameDisplay.textContent = "Canlı TV Yayınları";
        });
        
        // --- M3U YÜKLEME VE İŞLEME FONKSİYONLARI ---
        
        async function loadM3UFile(filename) {
            try {
                const response = await fetch(filename);
                if (!response.ok) {
                    throw new Error(`HTTP Hata kodu: ${response.status}`);
                }
                const content = await response.text();
                processM3UContent(content);
            } catch (error) {
                console.error("M3U dosyası yüklenirken hata oluştu:", error);
                if(loadingMessage) {
                    loadingMessage.innerHTML = `HATA: M3U dosyası (${filename}) yüklenemedi. Sunucu hatası veya dosya bulunamadı.`;
                }
                channelNameDisplay.textContent = "HATA: Kanal listesi yüklenemedi.";
            }
        }

        function processM3UContent(content) {
            allChannels = parseM3U(content);
            
            if (loadingMessage) {
                loadingMessage.remove();
            }
            
            if (allChannels.length > 0) {
                renderChannels(allChannels);
                
                currentChannelIndex = 0;
                const firstChannel = allChannels[currentChannelIndex];
                const firstItem = document.getElementById(`ch-${currentChannelIndex}`);
                if (firstItem) {
                     firstItem.classList.add('active');
                }
                playChannel(firstChannel, currentChannelIndex);

            } else {
                channelListDiv.innerHTML += '<p style="padding: 20px; text-align: center;">M3U dosyasında geçerli kanal bulunamadı.</p>';
                channelNameDisplay.textContent = "HATA: Geçerli kanal yok.";
            }
        }

        function parseM3U(content) {
            const lines = content.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            const channels = [];
            
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    const infoLine = lines[i];
                    const urlLine = lines[i + 1];

                    const channelNameMatch = infoLine.match(/,(.*)$/);
                    const channelName = channelNameMatch ? channelNameMatch[1].trim() : "Bilinmeyen Kanal";

                    const logoMatch = infoLine.match(/tvg-logo="([^"]*)"/);
                    const logoUrl = logoMatch ? logoMatch[1] : '';
                    
                    if (urlLine && (urlLine.startsWith('http://') || urlLine.startsWith('https://'))) {
                        channels.push({
                            name: channelName,
                            url: urlLine,
                            logo: logoUrl
                        });
                        i++; 
                    }
                }
            }
            return channels;
        }

        // Kanalları logolarıyla birlikte listeleme
        function renderChannels(channels) {
            channels.forEach((channel, index) => {
                const channelItem = document.createElement('div');
                channelItem.classList.add('channel-item');
                channelItem.id = `ch-${index}`;
                
                // Logo elementi
                const logoImg = document.createElement('img');
                logoImg.classList.add('channel-logo');
                logoImg.src = channel.logo || '';
                logoImg.alt = channel.name + ' Logosu';
                logoImg.onerror = function() {
                    this.style.visibility = 'hidden'; 
                };

                // Kanal Adı elementi
                const nameSpan = document.createElement('span');
                nameSpan.classList.add('channel-name');
                nameSpan.textContent = channel.name;

                channelItem.appendChild(logoImg);
                channelItem.appendChild(nameSpan);
                
                channelItem.addEventListener('click', function() {
                    document.querySelectorAll('.channel-item').forEach(item => {
                        item.classList.remove('active');
                    });
                    this.classList.add('active');
                    playChannel(channel, index);
                });

                channelListDiv.appendChild(channelItem);
            });
        }

        // Kanalı oynatma fonksiyonu (Video.js kullanılarak)
        function playChannel(channel, index) {
            currentChannelIndex = index;
            channelNameDisplay.textContent = `${channel.name} (Yükleniyor...)`;
            
            document.title = `${channel.name} Canlı İzle | Filmoloji`;


            if (!player) {
                player = videojs('video-js-player', {
                    responsive: true,
                    fluid: true,
                    playbackRates: [0.5, 1, 1.25, 1.5, 2], 
                    html5: { vhs: { overrideNative: true } }
                });
                player.hlsQualitySelector({ displayLabel: 'Kalite' });
                setupPlayerEvents(player);
            }

            // Oynatıcı kaynağını ayarla
            player.src({
                src: channel.url,
                type: 'application/x-mpegURL' // HLS/M3U8 için doğru MIME tipi
            });

            player.ready(function() {
                player.play().then(() => {
                    channelNameDisplay.textContent = channel.name;
                }).catch(error => {
                    console.log("Video.js Otomatik Oynatma Engellendi.");
                    channelNameDisplay.textContent = `${channel.name} (Başlatmak için oynatıcıya tıklayın)`;
                });
            });

            player.off('error');
            player.on('error', function(e) {
                console.error("Video.js Oynatma Hatası:", player.error());
                showToast(`<i class="fas fa-exclamation-triangle"></i> ${channel.name} - Kaynak Hatası!`);
                channelNameDisplay.textContent = `HATA: ${channel.name} (Oynatma hatası)`;
            });
        }
        
        function setupPlayerEvents(playerInstance) {
             playerInstance.on('waiting', function() {
                if (!playerInstance.paused()) {
                    showToast('<i class="fas fa-circle-notch fa-spin"></i> Yükleniyor...');
                }
            });

            playerInstance.on('playing', function() {
                 const toast = document.getElementById('toast');
                 if (toast.classList.contains('show')) {
                     toast.classList.remove('show');
                 }
            });
        }
        
        // --- ORTAK YARDIMCI FONKSİYONLAR --- 

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerHTML = message;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 4000); 
        }

        function goToSuggestions() { 
            if (document.getElementById('mobileMenuOverlay').classList.contains('open') && window.innerWidth <= 1000) toggleMenu(); 
            document.getElementById('suggestions').scrollIntoView({ behavior: 'smooth' }); 
        }
        function openSearch() { 
            document.getElementById('searchBox').classList.add('active'); 
            document.getElementById('searchInput').focus(); 
            if (window.innerWidth <= 1000 && document.getElementById('mobileMenuOverlay').classList.contains('open')) toggleMenu(); 
        }
        function closeSearch() { 
            document.getElementById('searchBox').classList.remove('active'); 
            document.getElementById('searchInput').value = ''; 
        }
        function handleSearchRedirect(event) { 
            if (event.key === 'Enter') { 
                const query = document.getElementById('searchInput').value; 
                if (query) window.location.href = `index.html?search=${encodeURIComponent(query)}`; 
            } 
        }
        function toggleMenu() {
            const overlay = document.getElementById('mobileMenuOverlay');
            const menuIcon = document.getElementById('menuToggle').querySelector('i');
            const backdrop = document.getElementById('mobileBackdrop');
            if (window.innerWidth > 1000) return;
            const isOpen = overlay.classList.contains('open');
            if (isOpen) {
                overlay.classList.remove('open');
                menuIcon.className = 'fas fa-bars';
                document.body.style.overflow = 'auto'; 
                setTimeout(() => { backdrop.style.display = 'none'; overlay.style.display = 'none'; }, 300); 
            } else {
                backdrop.style.display = 'block';
                overlay.style.display = 'flex';
                setTimeout(() => { overlay.classList.add('open'); }, 10); 
                menuIcon.className = 'fas fa-times'; 
                document.body.style.overflow = 'hidden'; 
            }
        }
        
        // İSTEK & ÖNERİ FORMU GÖNDERİMİ
        async function submitSuggestion(event) {
            event.preventDefault(); 
            const form = event.target;
            const submitButton = form.querySelector('.btn-submit');
            const originalButtonText = submitButton.innerHTML;
            submitButton.disabled = true;
            submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gönderiliyor...';

            try {
                const response = await fetch(form.action, {
                    method: form.method,
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    showToast('<i class="fas fa-check-circle" style="color: #4CAF50;"></i> İsteğiniz/Öneriniz Başarıyla Alındı!');
                    form.reset(); 
                } else {
                    showToast('<i class="fas fa-exclamation-triangle" style="color: #FFC107;"></i> Gönderimde Hata Oluştu. Tekrar Deneyin.');
                }
            } catch (error) {
                console.error('Gönderim Hatası:', error);
                showToast('<i class="fas fa-exclamation-circle" style="color: #F44336;"></i> Sunucuya Erişilemedi. Lütfen daha sonra tekrar deneyin.');
            } finally {
                submitButton.disabled = false;
                submitButton.innerHTML = originalButtonText;
            }
        }
        
        // KLAVYE KISAYOLLARI (M3U için güncellendi)
        document.addEventListener('keydown', function(event) {
            // Güvenlik fonksiyonu zaten çalışıyor, ancak player kısayolları için tekrar kontrol ediyoruz.
            if (!player || document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
            
            const key = event.key.toLowerCase();
            switch(key) {
                case ' ': case 'k': 
                    event.preventDefault(); 
                    if (player.paused()) { player.play(); showToast('<i class="fas fa-play"></i> Oynatılıyor'); } 
                    else { player.pause(); showToast('<i class="fas fa-pause"></i> Duraklatıldı'); }
                    break;
                case 'f': 
                    event.preventDefault(); 
                    if (player.isFullscreen()) player.exitFullscreen(); else player.requestFullscreen();
                    break;
                case 'm': 
                    player.muted(!player.muted());
                    if(player.muted()) showToast('<i class="fas fa-volume-mute"></i> Sessiz'); else showToast('<i class="fas fa-volume-up"></i> Ses Açık');
                    break;
                case 'arrowright': player.currentTime(player.currentTime() + 10); showToast('<i class="fas fa-forward"></i> +10 Sn'); break;
                case 'arrowleft': player.currentTime(player.currentTime() - 10); showToast('<i class="fas fa-backward"></i> -10 Sn'); break;
                case 'arrowup': event.preventDefault(); let volUp = player.volume() + 0.1; if(volUp > 1) volUp = 1; player.volume(volUp); showToast(`<i class="fas fa-volume-up"></i> %${Math.round(volUp*100)}`); break;
                case 'arrowdown': event.preventDefault(); let volDown = player.volume() - 0.1; if(volDown < 0) volDown = 0; player.volume(volDown); showToast(`<i class="fas fa-volume-down"></i> %${Math.round(volDown*100)}`); break;
                case 'p': // Previous Channel
                    event.preventDefault();
                    if (currentChannelIndex > 0) {
                        const newIndex = currentChannelIndex - 1;
                        const channel = allChannels[newIndex];
                        document.getElementById(`ch-${currentChannelIndex}`).classList.remove('active');
                        document.getElementById(`ch-${newIndex}`).classList.add('active');
                        playChannel(channel, newIndex);
                        showToast(`<i class="fas fa-step-backward"></i> Önceki Kanal: ${channel.name}`);
                        document.getElementById(`ch-${newIndex}`).scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                    break;
                case 'n': // Next Channel
                    event.preventDefault();
                    if (currentChannelIndex < allChannels.length - 1) {
                        const newIndex = currentChannelIndex + 1;
                        const channel = allChannels[newIndex];
                        document.getElementById(`ch-${currentChannelIndex}`).classList.remove('active');
                        document.getElementById(`ch-${newIndex}`).classList.add('active');
                        playChannel(channel, newIndex);
                        showToast(`<i class="fas fa-step-forward"></i> Sonraki Kanal: ${channel.name}`);
                        document.getElementById(`ch-${newIndex}`).scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                    break;
            }
        });
    </script>
