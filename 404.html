<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>404 - Sayfa Bulunamadı | Filmoloji</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
    
    <style>
        /* --- TEMEL VE NAVBAR AYARLARI (index.html'den Kopyalandı) --- */
        * { 
            box-sizing: border-box; margin: 0; padding: 0; outline: none; 
            user-select: none; -webkit-user-select: none; 
        }
        img { -webkit-user-drag: none; user-drag: none; }

        :root { --brand-color: #E50914; --bg-dark: #101010; --glass-bg: rgba(20, 20, 20, 0.9); --blur: blur(20px); }
        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; overflow-x: hidden;
            display: flex; flex-direction: column; min-height: 100vh; justify-content: center; align-items: center; text-align: center; /* 404 içeriğini ortalamak için */
        }
        
        /* Scrollbar (Kopyalandı) */
        ::-webkit-scrollbar { width: 8px; height: 8px; background: #141414; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1200px; height: 65px;
            background: var(--glass-bg); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 35px;
            display: flex; align-items: center; justify-content: space-between; padding: 0 25px;
            z-index: 1000; transition: 0.3s; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .navbar.scrolled { background-color: #141414; border: none; }

        .logo-container { display: flex; align-items: center; cursor: pointer; }
        .logo-text { 
            color: var(--brand-color); font-size: 24px; font-weight: 900; 
            letter-spacing: -0.5px; font-family: 'Arial Black', sans-serif; text-transform: uppercase; 
            display: flex; align-items: center; text-shadow: 0 0 10px rgba(229, 9, 20, 0.6);
        }
        
        .version-badge { 
            background: rgba(255,255,255,0.15); color: #aaa; font-size: 10px; padding: 2px 6px; 
            border-radius: 4px; margin-left: 8px; font-weight: normal;
            border: 1px solid rgba(255,255,255,0.1); letter-spacing: 0; font-family: sans-serif;
        }

        .nav-menu { display: flex; gap: 20px; margin-left: 40px; flex-grow: 1; }
        .nav-item { cursor: pointer; color: #aaa; font-weight: 500; font-size: 14px; transition: 0.2s; text-decoration: none; display: flex; align-items: center; }
        .nav-item i { margin-right: 8px; }
        .nav-item:hover { color: white; }
        .nav-item.active { color: white; font-weight: bold; }

        /* Premium Vurgusu */
        .nav-menu .nav-item.premium-btn {
            color: #FFC107; font-weight: 900; text-shadow: 0 0 10px rgba(255, 193, 7, 0.5);
            padding: 8px 15px; border-radius: 20px; background: rgba(255, 193, 7, 0.1); border: 1px solid rgba(255, 193, 7, 0.3);
        }
        .nav-menu .nav-item.premium-btn:hover {
            color: #FFE082; background: rgba(255, 193, 7, 0.2); transform: scale(1.05);
        }

        /* --- ARAMA --- */
        .search-container { 
            display: flex; align-items: center; background: transparent; 
            border-radius: 30px; padding: 5px 15px; width: 40px; overflow: hidden; 
            transition: 0.4s; cursor: pointer; border: 1px solid transparent; 
        }
        .search-container:hover, .search-container.active { width: 140px; background: rgba(0,0,0,0.8); border-color: rgba(255,255,255,0.2); }
        .search-icon-btn { font-size: 18px; flex-shrink: 0; color: var(--brand-color); margin-right: 10px; }
        .search-input { width: 100%; background: transparent; border: none; color: white; outline: none; font-size: 14px; opacity: 0; transition: 0.3s; }
        .search-container:hover .search-input, .search-container.active .search-input { opacity: 1; }
        .close-search { font-size: 16px; cursor: pointer; color: #aaa; margin-left: auto; display: none; }
        .search-container.active .close-search { display: block; }

        /* MOBİL MENU */
        .menu-toggle { display: none; background: none; border: none; color: white; font-size: 24px; cursor: pointer; z-index: 1001; }
        .mobile-menu-overlay {
            position: fixed; top: 0; right: 0; width: 300px; max-width: 80%; height: 100%;
            background: var(--bg-dark); box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
            z-index: 999; display: none; flex-direction: column; padding-top: 60px; 
            transform: translateX(100%); transition: transform 0.3s ease-out; 
        }
        .mobile-menu-overlay.open { transform: translateX(0); display: flex; }
        .mobile-nav-menu { display: flex; flex-direction: column; gap: 5px; padding: 20px; }
        .mobile-nav-menu .nav-item { font-size: 1.1rem; padding: 15px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .mobile-nav-menu .nav-item:last-child { color: #FFC107; border-bottom: none; }

        @media (max-width: 992px) {
            .navbar { top: 0; left: 0; transform: none; width: 100%; border-radius: 0; padding: 0 15px; height: 60px; background: #141414; backdrop-filter: none; }
            .nav-menu { display: none; }
            .logo-container { order: 1; }
            .search-container { order: 2; margin-left: auto; }
            .search-container.active { width: calc(100% - 140px); position: absolute; left: 70px; top: 5px; height: 50px; }
            .menu-toggle { display: block; order: 3; margin-left: 10px; }
            
            /* 404 İçeriği Ayarları */
            .not-found-container { margin-top: 80px; padding: 20px; }
            .error-code { font-size: 6rem; }
            .error-message { font-size: 1.5rem; }
            .error-detail { font-size: 1rem; }
        }

        /* --- 404 KAPSAYICI --- */
        .not-found-container {
            max-width: 600px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            margin-top: 100px; 
        }

        .error-code {
            font-size: 8rem; 
            font-weight: 900;
            color: var(--brand-color);
            text-shadow: 0 0 20px rgba(229, 9, 20, 0.8);
            margin-bottom: 0px;
            line-height: 1;
        }

        .error-message {
            font-size: 2rem;
            font-weight: 700;
            margin-top: 10px;
            color: #f0f0f0;
        }

        .error-detail {
            font-size: 1.1rem;
            color: #aaa;
            margin: 20px 0 30px 0;
            line-height: 1.5;
        }

        .btn { 
            padding: 12px 30px; 
            border-radius: 30px; 
            border: none; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 16px; 
            transition: all 0.3s ease; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            text-decoration: none; 
        }
        
        .btn-home { 
            background: var(--brand-color); 
            color: white; 
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.6); 
        }
        
        .btn-home:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 30px rgba(229, 9, 20, 0.9); 
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <div class="logo-container" onclick="window.location.href='index.html'">
            <h1 class="logo-text">Filmoloji <span class="version-badge">V2.0</span></h1>
        </div>
        <div class="nav-menu" id="desktop-nav-menu">
            <a onclick="switchPage('home')" class="nav-item active" id="nav-home"><i class="fas fa-home"></i> Ana Sayfa</a>
            <a onclick="switchPage('series')" class="nav-item" id="nav-series"><i class="fas fa-tv"></i> Diziler</a>
            <a onclick="switchPage('movies')" class="nav-item" id="nav-movies"><i class="fas fa-film"></i> Filmler</a>
            <a onclick="goToSuggestions()" class="nav-item"><i class="fas fa-paper-plane"></i> İstek & Öneri</a>
            <a href="login.html" class="nav-item premium-btn"><i class="fas fa-crown"></i> Premium</a>
        </div>
        <div class="search-container" id="searchBox">
            <div class="search-icon-btn" onclick="openSearch()"><i class="fas fa-search"></i></div>
            <input type="text" class="search-input" id="searchInput" placeholder="Film veya dizi ara..." onkeyup="handleSearchRedirect(event)">
            <div class="close-search" onclick="closeSearch()">&times;</div>
        </div>
        <button class="menu-toggle" id="menuToggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
    </nav>

    <div id="mobileBackdrop" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 998; display: none;" onclick="toggleMenu()"></div>
    <div class="mobile-menu-overlay" id="mobileMenuOverlay">
        <button class="menu-toggle" style="position: absolute; top: 15px; right: 20px; color: #E50914;" onclick="toggleMenu()"><i class="fas fa-times"></i></button>
        <div class="mobile-nav-menu">
            <a onclick="switchPage('home'); toggleMenu()" class="nav-item active" id="mob-nav-home"><i class="fas fa-home"></i> Ana Sayfa</a>
            <a onclick="switchPage('series'); toggleMenu()" class="nav-item" id="mob-nav-series"><i class="fas fa-tv"></i> Diziler</a>
            <a onclick="switchPage('movies'); toggleMenu()" class="nav-item" id="mob-nav-movies"><i class="fas fa-film"></i> Filmler</a>
            <a onclick="goToSuggestions(); toggleMenu()" class="nav-item"><i class="fas fa-paper-plane"></i> İstek & Öneri</a>
            <a href="login.html" class="nav-item premium-btn" onclick="toggleMenu()"><i class="fas fa-crown"></i> Premium</a>
        </div>
    </div>

    <div class="not-found-container">
        
        <p class="error-code">404</p>

        <h1 class="error-message">Sayfa Bulunamadı</h1>
        
        <p class="error-detail">
            Aradığınız film, dizi veya sayfa yerini değiştirmiş ya da silinmiş olabilir. Lütfen URL'yi kontrol edin veya ana sayfaya geri dönün.
        </p>

        <a href="index.html" class="btn btn-home">
            <i class="fas fa-home"></i> Ana Sayfaya Dön
        </a>
    </div>

    <script>
    // --- NAVBAR FONKSİYONLARI (index.html'den Kopyalandı ve 404'e Uyarlandı) ---
    
    // Sayfa Yönlendirme Fonksiyonu (404'e özel, ana sayfaya yönlendirir)
    function switchPage(pageName) {
        if (pageName === 'home') {
            window.location.href = 'index.html';
        } else {
            // Diziler veya Filmler sayfasına gitmek için index'e parametre ile yönlendirir.
            window.location.href = `index.html?page=${pageName}`;
        }
    }
    
    function goToSuggestions() {
        // İstek & Öneri bölümüne gitmek için index'e yönlendirir.
        window.location.href = 'index.html#suggestions';
    }

    // Arama Kutusu Fonksiyonları
    function openSearch() { 
        document.getElementById('searchBox').classList.add('active'); 
        document.getElementById('searchInput').focus(); 
        if (window.innerWidth <= 992 && document.getElementById('mobileMenuOverlay').classList.contains('open')) { toggleMenu(); }
    }
    
    function closeSearch() {
        document.getElementById('searchBox').classList.remove('active');
        document.getElementById('searchInput').value = '';
    }

    function handleSearchRedirect(event) {
        if (event.key === 'Enter') {
            const query = document.getElementById('searchInput').value;
            if (query) { 
                // Arama sorgusunu ana sayfaya yönlendirir.
                window.location.href = `index.html?search=${encodeURIComponent(query)}`; 
            }
        }
    }

    // Mobil Menü Fonksiyonları
    function toggleMenu() {
        const overlay = document.getElementById('mobileMenuOverlay');
        const backdrop = document.getElementById('mobileBackdrop');
        const menuIcon = document.getElementById('menuToggle').querySelector('i');
        const isOpen = overlay.classList.contains('open');

        if (isOpen) {
            overlay.classList.remove('open');
            menuIcon.className = 'fas fa-bars';
            document.body.style.overflow = 'auto'; 
            setTimeout(() => { backdrop.style.display = 'none'; overlay.style.display = 'none'; }, 300); 
        } else {
            backdrop.style.display = 'block';
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.classList.add('open'); }, 10); 
            menuIcon.className = 'fas fa-times'; 
            document.body.style.overflow = 'hidden'; 
        }
    }
    
    // Scroll Efekti (404 sayfasında scroll az olacağı için opsiyoneldir, ancak tutarlılık için eklendi)
    window.onscroll = function() {
        const nav = document.getElementById('navbar');
        // Mobil menü açıkken scroll class'ını değiştirmeyi engeller
        if (window.innerWidth > 992 || !document.getElementById('mobileMenuOverlay').classList.contains('open')) {
            nav.classList.toggle('scrolled', window.scrollY > 50);
        }
    };
    </script>
</body>
</html>
