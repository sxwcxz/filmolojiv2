<!DOCTYPE html>
<html lang="tr">
<head>
<script src="auth.js"></script>
<script>
    checkAuth('indir'); // 'indir' veya herhangi bir şey yazılabilir, admin engeli yok
</script>
    <meta charset="UTF-8">
    <title>İndirme Merkezi - Filmoloji</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="database.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; font-family: 'Segoe UI', sans-serif; }
        body { 
            background-color: #0a0a0a; color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background-size: cover; background-position: center; background-attachment: fixed;
            position: relative;
        }
        /* Arka planı karartma */
        body::before {
            content: ''; position: absolute; inset: 0;
            background: rgba(0,0,0,0.92); backdrop-filter: blur(20px); z-index: -1;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.8); border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between; padding: 0 5%;
            z-index: 1000; backdrop-filter: blur(10px);
        }
        
        .logo-container { cursor: pointer; display: flex; align-items: center; }
        .logo-main { 
            color: #E50914; font-size: 24px; font-weight: 900; letter-spacing: -0.5px; font-family: 'Arial Black', sans-serif; text-transform: uppercase;
            text-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
        }
        .logo-sub {
            color: #888; font-size: 12px; font-weight: 600; margin-left: 8px; letter-spacing: 1px;
            background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px;
        }

        .nav-back-btn {
            text-decoration: none; color: #ddd; font-weight: 600; font-size: 14px;
            display: flex; align-items: center; gap: 8px; transition: 0.3s;
            background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-back-btn:hover { background: white; color: black; }
        
        /* --- ANA KONTEYNER --- */
        .container { width: 95%; max-width: 600px; margin-top: 100px; padding-bottom: 50px; z-index: 10; }

        /* ARAMA KUTUSU */
        .search-wrapper { position: relative; margin-bottom: 20px; }
        .search-input { 
            width: 100%; padding: 15px 45px 15px 20px; background: #1a1a1a; border: 1px solid #333; 
            border-radius: 30px; color: white; font-size: 1rem; transition: 0.3s;
        }
        .search-input:focus { border-color: #E50914; box-shadow: 0 0 15px rgba(229,9,20,0.2); }
        .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #666; }

        /* SONUÇ LİSTESİ */
        .results-list {
            display: none; flex-direction: column; gap: 8px; 
            background: #161616; padding: 10px; border-radius: 10px; 
            max-height: 300px; overflow-y: auto; border: 1px solid #333;
            position: absolute; width: 100%; z-index: 500; top: 100%;
        }
        .res-item { display: flex; align-items: center; gap: 10px; padding: 8px; background: #222; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .res-item:hover { background: #333; }
        .res-img { width: 35px; height: 50px; object-fit: cover; border-radius: 4px; background: #333; }
        .res-info div:first-child { font-weight: bold; font-size: 0.9rem; color: #eee; }
        .res-info div:last-child { font-size: 0.75rem; color: #888; }

        /* ANA PANEL */
        .panel { 
            background: rgba(30, 30, 30, 0.8); border: 1px solid rgba(255,255,255,0.1);
            padding: 30px; border-radius: 20px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        .top-bar { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, #E50914, #ff6b6b); }

        /* POSTER KUTUSU */
        .poster-box { 
            width: 140px; height: 210px; margin-bottom: 20px; 
            border-radius: 10px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            border: 2px solid #333;
            background: linear-gradient(45deg, #1a1a1a, #252525);
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .poster-box::after {
            content: '\f03e'; font-family: "Font Awesome 6 Free"; font-weight: 900;
            font-size: 3rem; color: #333; position: absolute; z-index: 1;
        }
        .poster-box img { 
            width: 100%; height: 100%; object-fit: cover;
            position: relative; z-index: 2; opacity: 0; transition: opacity 0.5s ease-in;
        }
        .poster-box img.loaded { opacity: 1; }

        h1 { font-size: 1.6rem; margin: 0 0 5px 0; font-weight: 700; }
        .meta { color: #888; font-size: 0.9rem; margin-bottom: 20px; }

        /* KONTROLLER */
        .controls { width: 100%; display: flex; gap: 10px; margin-bottom: 20px; }
        .custom-select { flex: 1; padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 8px; cursor: pointer; outline: none; }
        
        /* DURUM KUTUSU (LİNK YERİNE) */
        .status-box { 
            width: 100%; background: #000; border: 1px solid #333; border-radius: 8px; 
            display: flex; align-items: center; justify-content: center;
            padding: 12px; margin-bottom: 20px; font-family: monospace; font-size: 0.95rem;
            color: #666; font-weight: bold; letter-spacing: 0.5px;
        }
        .status-box.ready { color: #46d369; border-color: #46d369; background: rgba(70, 211, 105, 0.1); }

        .warning-box {
            width: 100%; background: rgba(255, 193, 7, 0.15); border: 1px solid rgba(255, 193, 7, 0.3);
            color: #ffc107; font-size: 0.8rem; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: left;
            display: flex; gap: 10px; align-items: center;
        }

        /* BUTONLAR */
        .actions { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        .action-btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 12px; border-radius: 8px;
            text-decoration: none; font-weight: bold; transition: 0.2s;
            border: 1px solid transparent; font-size: 0.95rem; cursor: pointer;
        }
        
        .btn-primary { background: #E50914; color: white; }
        .btn-primary:hover { background: #b0060e; }
        
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.1); }
        .btn-secondary:hover { background: rgba(255,255,255,0.2); }

        .btn-group { display: flex; gap: 10px; }
        .btn-group .action-btn { flex: 1; font-size: 0.85rem; background: #2c3e50; color: white; }
        .btn-group .action-btn:hover { background: #34495e; }

        @media (max-width: 600px) { .controls { flex-direction: column; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container" onclick="location.href='index.html'">
            <span class="logo-main">Filmoloji</span> 
            <span class="logo-sub">DOWNLOADER</span>
        </div>
        <a href="index.html" class="nav-back-btn">
            <i class="fas fa-arrow-left"></i> Geri Dön
        </a>
    </nav>

    <div class="container">
        <div class="search-wrapper">
            <input type="text" class="search-input" id="searchInp" placeholder="Film veya Dizi Ara..." onkeyup="handleSearch()">
            <i class="fas fa-search search-icon"></i>
            <div class="results-list" id="resultsList"></div>
        </div>

        <div class="panel">
            <div class="top-bar"></div>
            
            <div class="poster-box">
                <img id="poster" alt="Poster" onload="this.classList.add('loaded')" onerror="this.classList.remove('loaded')">
            </div>

            <h1 id="title">İndirme Merkezi</h1>
            <div class="meta" id="desc">Lütfen yukarıdan arama yapın veya bir içerik seçin.</div>

            <div class="controls" id="seriesControls" style="display:none;">
                <select id="seasonSelect" class="custom-select" onchange="loadEpisodes()"></select>
                <select id="episodeSelect" class="custom-select" onchange="updateLink()"></select>
            </div>

            <div id="statusBox" class="status-box">
                <i class="fas fa-circle-notch"></i> Seçim Bekleniyor...
            </div>

            <div class="warning-box">
                <i class="fas fa-exclamation-triangle"></i>
                <span><b>BİLGİ:</b> Aşağıdaki butonlara bastığınızda indirme linki otomatik olarak kopyalanacaktır.</span>
            </div>

            <div class="actions">
                <button onclick="downloadOriginal()" class="action-btn btn-primary">
                    <i class="fas fa-file-video"></i> Orijinal Formatta İndir (.m3u8)
                </button>

                <div class="btn-group">
                    <button onclick="openDownloader(1)" class="action-btn btn-secondary">
                        <i class="fas fa-download"></i> MP4 İndir 1
                    </button>
                    <button onclick="openDownloader(2)" class="action-btn btn-secondary">
                        <i class="fas fa-download"></i> MP4 İndir 2
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
            .then(registration => {
                console.log('PWA ServiceWorker kaydı başarılı.');
            })
            .catch(err => {
                console.log('PWA ServiceWorker kaydı başarısız:', err);
            });
    });
}
        let ALL_CONTENT = [];
        let selectedData = null;
        let currentUrl = "";

        window.onload = async function() {
            if (typeof DATABASE !== 'undefined') { ALL_CONTENT = [...DATABASE]; }
            try {
                const response = await fetch('database.json');
                if(response.ok) { const jsonMovies = await response.json(); ALL_CONTENT = [...ALL_CONTENT, ...jsonMovies]; }
            } catch (e) { console.log("JSON yerel modda atlandı."); }

            const storedData = JSON.parse(localStorage.getItem('downloadData'));
            if (storedData) {
                const freshItem = ALL_CONTENT.find(x => x.id === storedData.id);
                if(freshItem) { selectItem(freshItem); } else { renderManual(storedData); }
                localStorage.removeItem('downloadData');
            }
        };

        function handleSearch() {
            const query = document.getElementById('searchInp').value.toLowerCase();
            const list = document.getElementById('resultsList');
            list.innerHTML = '';
            if (query.length < 2) { list.style.display = 'none'; return; }
            
            const results = ALL_CONTENT.filter(i => i.title.toLowerCase().includes(query));
            if(results.length > 0) {
                list.style.display = 'flex';
                results.slice(0, 8).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'res-item';
                    div.innerHTML = `
                        <img src="${item.poster}" class="res-img" onerror="this.style.display='none'">
                        <div class="res-info">
                            <div>${item.title}</div>
                            <div>${item.type === 'series' ? 'Dizi' : 'Film'} | ${item.year}</div>
                        </div>
                    `;
                    div.onclick = () => selectItem(item);
                    list.appendChild(div);
                });
            } else { list.style.display = 'none'; }
        }

        function selectItem(item) {
            selectedData = item;
            document.getElementById('resultsList').style.display = 'none';
            document.getElementById('searchInp').value = '';
            updateUI(item.title, item.poster, item.description);
            
            if(item.type === 'series') {
                document.getElementById('seriesControls').style.display = 'flex';
                setStatus(false, "Bölüm Seçiniz...");
                loadSeasons(item.seasons);
            } else {
                document.getElementById('seriesControls').style.display = 'none';
                currentUrl = item.source;
                setStatus(true, "✅ BAĞLANTI BULUNDU");
            }
        }

        function renderManual(data) {
             updateUI(data.title, data.poster, data.desc);
             currentUrl = data.source;
             document.getElementById('seriesControls').style.display = 'none';
             setStatus(true, "✅ BAĞLANTI BULUNDU");
        }

        function updateUI(title, posterUrl, desc) {
            document.getElementById('title').innerText = title;
            document.getElementById('desc').innerText = desc ? desc.substring(0, 100) + "..." : "";
            document.title = "İndir: " + title;
            
            const posterImg = document.getElementById('poster');
            posterImg.classList.remove('loaded');
            posterImg.src = posterUrl;

            if(posterUrl && posterUrl.startsWith('http')) {
                 document.body.style.backgroundImage = `url('${posterUrl}')`;
            }
        }

        function setStatus(isReady, text) {
            const box = document.getElementById('statusBox');
            box.innerHTML = isReady ? `<i class="fas fa-check-circle"></i> ${text}` : `<i class="fas fa-circle-notch"></i> ${text}`;
            if(isReady) box.classList.add('ready'); else box.classList.remove('ready');
        }

        function loadSeasons(seasons) {
            const sSelect = document.getElementById('seasonSelect');
            sSelect.innerHTML = '<option disabled selected>Sezon</option>';
            seasons.forEach((s, i) => { sSelect.innerHTML += `<option value="${i}">${s.name}</option>`; });
            document.getElementById('episodeSelect').innerHTML = '<option disabled selected>Bölüm</option>';
        }
        function loadEpisodes() {
            const sIdx = document.getElementById('seasonSelect').value;
            const eSelect = document.getElementById('episodeSelect');
            eSelect.innerHTML = '<option disabled selected>Bölüm</option>';
            selectedData.seasons[sIdx].episodes.forEach((ep, i) => { eSelect.innerHTML += `<option value="${i}">${ep.name}</option>`; });
        }
        function updateLink() {
            const sIdx = document.getElementById('seasonSelect').value;
            const eIdx = document.getElementById('episodeSelect').value;
            currentUrl = selectedData.seasons[sIdx].episodes[eIdx].source;
            setStatus(true, "✅ BAĞLANTI BULUNDU");
        }

        function copyLink() {
            if(!currentUrl || currentUrl.includes("...")) return;
            navigator.clipboard.writeText(currentUrl);
        }

        function openDownloader(index) {
            copyLink(); // Linki arka planda kopyala
            let url = index === 1 ? "https://m3u8downloader.app/" : "https://www.m3u8player.online/downloader";
            // Kullanıcıya "Kopyalandı" hissi vermek için ufak gecikme
            const btn = event.currentTarget;
            const oldText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Kopyalandı, Açılıyor...';
            setTimeout(() => {
                window.open(url, "_blank");
                btn.innerHTML = oldText;
            }, 800);
        }

        function downloadOriginal() { 
            if(currentUrl) window.open(currentUrl, "_blank"); 
        }
    </script>
</body>
</html>
