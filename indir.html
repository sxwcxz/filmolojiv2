<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filmoloji | Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #e50914; /* Netflix Kırmızısı */
            --primary-glow: rgba(229, 9, 20, 0.5);
            --bg-dark: #050505;
            --surface: #121212;
            --border: #2a2a2a;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            /* Hafif Grid Deseni */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Ortam Işığı */
        .ambient-glow {
            position: fixed; top: 50%; left: 50%;
            width: 80vw; height: 80vw;
            background: radial-gradient(circle, rgba(229, 9, 20, 0.15), transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -1; pointer-events: none;
        }

        /* Geri Dön Butonu */
        .back-btn {
            position: absolute; top: 20px; left: 20px;
            color: var(--text-muted); text-decoration: none;
            font-size: 14px; display: flex; align-items: center; gap: 8px;
            transition: 0.3s; z-index: 100;
            background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 20px;
            border: 1px solid var(--border);
        }
        .back-btn:hover { color: #fff; background: var(--primary); border-color: var(--primary); }

        /* Ana Kart */
        .downloader-card {
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            width: 100%; max-width: 900px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 30px;
            position: relative;
        }

        /* Başlık */
        .brand-header { text-align: center; }
        .brand-header h1 {
            font-weight: 900; font-size: clamp(1.8rem, 5vw, 2.5rem); margin: 0;
            letter-spacing: -1px; text-transform: uppercase;
        }
        .brand-header span { color: var(--primary); }
        .brand-header p { font-size: 13px; color: var(--text-muted); margin-top: 5px; font-family: 'JetBrains Mono', monospace; }

        /* Arama Kutusu */
        .search-box { position: relative; z-index: 50; }
        .search-box i {
            position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
            color: #666; transition: 0.3s;
        }
        input[type="text"] {
            width: 100%; padding: 18px 20px 18px 50px;
            background: #0a0a0a; border: 1px solid var(--border);
            border-radius: 16px; color: #fff; font-family: 'Outfit', sans-serif; font-size: 16px;
            outline: none; transition: 0.3s;
        }
        input[type="text"]:focus {
            border-color: var(--primary); background: #0f0f0f;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.15);
        }
        input[type="text"]:focus + i { color: var(--primary); }

        /* Sonuç Listesi */
        #results {
            position: absolute; top: 110%; left: 0; width: 100%;
            background: #111; border: 1px solid #333; border-radius: 12px;
            list-style: none; padding: 5px; margin: 0; z-index: 100;
            max-height: 280px; overflow-y: auto; display: none;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        #results li {
            padding: 12px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; gap: 15px;
            transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        #results li:hover { background: var(--primary); color: white; }
        #results img { width: 40px; height: 60px; border-radius: 4px; object-fit: cover; background: #222; flex-shrink: 0; }
        .res-text { display: flex; flex-direction: column; overflow: hidden; }
        .res-title { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .res-meta { font-size: 12px; opacity: 0.7; }

        /* İçerik Grid */
        .content-area {
            display: grid; grid-template-columns: 220px 1fr; gap: 40px;
            display: none; /* JS ile açılır */
            animation: fadeIn 0.5s ease;
        }

        .poster-wrapper { position: relative; }
        .poster-img {
            width: 100%; border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            aspect-ratio: 2/3; object-fit: cover;
        }

        .info-col { display: flex; flex-direction: column; justify-content: center; }
        .movie-title { 
            margin: 0 0 10px 0; 
            font-size: clamp(1.8rem, 4vw, 2.5rem); /* Responsive Font */
            font-weight: 700; line-height: 1.1; 
        }
        
        .tags { display: flex; gap: 8px; margin-bottom: 25px; flex-wrap: wrap; align-items: center; }
        .tag {
            font-size: 13px; padding: 6px 12px; border-radius: 8px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #ccc; font-weight: 500; display: flex; align-items: center; gap: 5px;
        }
        .tag.rating { color: #f5c518; border-color: rgba(245, 197, 24, 0.2); background: rgba(245, 197, 24, 0.1); }

        /* Seçim ve Buton */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        select {
            width: 100%; padding: 16px; background: #0a0a0a; border: 1px solid #333;
            border-radius: 12px; color: #fff; font-family: 'Outfit', sans-serif;
            outline: none; cursor: pointer; transition: 0.3s; appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a3a3a3' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 15px center; background-size: 16px;
        }
        select:hover { border-color: #555; }

        .btn-download {
            width: 100%; padding: 20px; border: none; border-radius: 14px;
            background: var(--primary); color: white;
            font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.3);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-download:hover {
            transform: translateY(-2px); box-shadow: 0 20px 50px rgba(229, 9, 20, 0.5);
            background: #ff0a16;
        }
        .btn-download:disabled { background: #333; color: #777; box-shadow: none; cursor: not-allowed; transform: none; }

        /* İlerleme Paneli (HUD) */
        .progress-hud {
            margin-top: 25px; background: #0a0a0a; padding: 20px; border-radius: 16px;
            border: 1px solid #222; display: none;
        }
        .hud-header { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 13px; color: #888; }
        .progress-bar-bg { height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
        .progress-bar-fill {
            height: 100%; width: 0%; background: var(--primary);
            transition: width 0.3s; box-shadow: 0 0 15px var(--primary);
        }
        .hud-footer {
            display: flex; justify-content: space-between; margin-top: 12px;
            font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #666;
        }
        .val { color: #fff; font-weight: 600; }

        /* --- MOBİL & TABLET UYUMU (RESPONSIVE) --- */
        @media (max-width: 900px) {
            .downloader-card { padding: 30px; }
            .content-area { grid-template-columns: 1fr; gap: 30px; text-align: center; }
            .poster-wrapper { width: 180px; margin: 0 auto; } /* Poster mobilde ortalanır */
            .info-col { align-items: center; }
            .tags { justify-content: center; }
            /* Select kutuları mobilde yan yana kalsın (kullanıcı deneyimi için) ama çok daralırsa alt alta geçer */
        }

        @media (max-width: 600px) {
            .downloader-card { padding: 20px; border-radius: 20px; }
            .back-btn { top: 10px; left: 10px; padding: 6px 10px; font-size: 12px; }
            .brand-header h1 { margin-top: 10px; } /* Buton ile çakışmasın */
            
            .poster-wrapper { width: 140px; }
            .controls { grid-template-columns: 1fr; width: 100%; } /* Mobilde alt alta olsun */
            
            .btn-download { padding: 16px; font-size: 15px; }
            .hud-footer { flex-direction: column; gap: 5px; text-align: center; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>

    <script src="database.js"></script>
    <div class="ambient-glow"></div>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Ana Sayfa</a>

    <div class="downloader-card">
        <div class="brand-header">
            <h1>Filmoloji <span>Downloader</span></h1>
            <p>Premium Hızlı İndirme Aracı</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="İçerik ara..." onkeyup="searchContent()" autocomplete="off">
            <i class="fas fa-search"></i>
            <ul id="results"></ul>
        </div>

        <div id="contentArea" class="content-area">
            <div class="poster-wrapper">
                <img id="posterImg" src="" class="poster-img">
            </div>

            <div class="info-col">
                <h2 id="movieTitle" class="movie-title">Film Başlığı</h2>
                
                <div class="tags">
                    <span class="tag rating"><i class="fas fa-star"></i> <span id="ratingTxt">0.0</span></span>
                    <span id="yearTxt" class="tag">2024</span>
                    <span id="typeTxt" class="tag">FILM</span>
                    <span class="tag" style="border-color:#00ff9d; color:#00ff9d; background:rgba(0,255,157,0.05);">Worker Active</span>
                </div>

                <div id="seriesControls" class="controls" style="display:none;">
                    <select id="seasonSelect" onchange="loadEpisodes()"></select>
                    <select id="episodeSelect" onchange="ready()"></select>
                </div>

                <button id="dlBtn" class="btn-download" onclick="startDownloadProcess()">
                    <i class="fas fa-download"></i> İndirmeyi Başlat
                </button>

                <div id="hudPanel" class="progress-hud">
                    <div class="hud-header">
                        <span id="statusTxt">Hazır</span>
                        <span id="percentTxt" style="color:#fff">0%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="progressBar" class="progress-bar-fill"></div>
                    </div>
                    <div class="hud-footer">
                        <span><i class="fas fa-layer-group"></i> <span id="chunkTxt" class="val">0/0</span></span>
                        <span><i class="fas fa-hdd"></i> <span id="sizeTxt" class="val">--</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedItem = null;
        let rawSource = "";
        const WORKER_BASE = "https://mac.filmolojilive.workers.dev/";

        function searchContent() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('results');
            list.innerHTML = "";
            if(val.length < 2) { list.style.display = 'none'; return; }

            const found = DATABASE.filter(x => x.title.toLowerCase().includes(val));
            if(found.length > 0) {
                list.style.display = 'block';
                found.forEach(item => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <img src="${item.poster || 'https://via.placeholder.com/40x60'}" alt="">
                        <div class="res-text">
                            <div class="res-title">${item.title}</div>
                            <div class="res-meta">${item.year} • ${item.type === 'series' ? 'Dizi' : 'Film'}</div>
                        </div>
                    `;
                    li.onclick = () => selectItem(item);
                    list.appendChild(li);
                });
            } else { list.style.display = 'none'; }
        }

        function selectItem(item) {
            selectedItem = item;
            document.getElementById('results').style.display = 'none';
            document.getElementById('searchInput').value = "";
            document.getElementById('contentArea').style.display = 'grid';

            document.getElementById('movieTitle').innerText = item.title;
            document.getElementById('posterImg').src = item.poster;
            document.getElementById('yearTxt').innerText = item.year;
            document.getElementById('typeTxt').innerText = item.type === 'series' ? 'DİZİ' : 'FİLM';
            document.getElementById('ratingTxt').innerText = item.puan || 'N/A';

            if(item.type === 'series') {
                document.getElementById('seriesControls').style.display = 'grid';
                const s = document.getElementById('seasonSelect');
                s.innerHTML = '<option>Sezon Seç</option>';
                item.seasons.forEach((season, index) => {
                    s.innerHTML += `<option value="${index}">${season.name}</option>`;
                });
            } else {
                document.getElementById('seriesControls').style.display = 'none';
                rawSource = item.source;
            }
        }

        function loadEpisodes() {
            const sIdx = document.getElementById('seasonSelect').value;
            const e = document.getElementById('episodeSelect');
            e.innerHTML = '<option>Bölüm Seç</option>';
            selectedItem.seasons[sIdx].episodes.forEach((ep, index) => {
                e.innerHTML += `<option value="${index}">${ep.name}</option>`;
            });
        }

        function ready() {
            const sIdx = document.getElementById('seasonSelect').value;
            const eIdx = document.getElementById('episodeSelect').value;
            rawSource = selectedItem.seasons[sIdx].episodes[eIdx].source;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // --- İNDİRME MOTORU ---
        async function startDownloadProcess() {
            if(!rawSource) return alert("Seçim yapın!");
            
            const btn = document.getElementById('dlBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> BAŞLATILIYOR';
            
            const hud = document.getElementById('hudPanel');
            hud.style.display = 'block';
            updateStatus("Sunucuya Bağlanıyor...", 0);

            try {
                let initialUrl = rawSource;
                if(!initialUrl.includes("workers.dev")) {
                    initialUrl = WORKER_BASE + initialUrl;
                }

                updateStatus("Video Taranıyor...", 5);
                let finalSegments = await parseM3u8Recursively(initialUrl);

                if(!finalSegments || finalSegments.length === 0) throw new Error("Video bulunamadı");

                updateStatus("İndirme Başladı...", 10);

                let blobs = [];
                let total = finalSegments.length;
                let loaded = 0;
                let totalSize = 0;
                let fixedTotalSize = 0;
                let isSizeFixed = false;
                
                const BATCH_SIZE = 6;

                for(let i=0; i<total; i+=BATCH_SIZE) {
                    const batch = finalSegments.slice(i, i+BATCH_SIZE);
                    const promises = batch.map(url => fetch(url).then(r => r.blob()).catch(e=>null));
                    const results = await Promise.all(promises);
                    
                    results.forEach(b => {
                        if(b && b.size > 500) {
                            blobs.push(b);
                            totalSize += b.size;
                            loaded++;
                        }
                    });

                    let pct = Math.round((loaded/total)*100);
                    updateStatus("Veri İndiriliyor...", pct);
                    document.getElementById('chunkTxt').innerText = `${loaded}/${total}`;

                    let currentStr = formatBytes(totalSize);
                    let totalStr = "---";

                    if(!isSizeFixed && loaded >= 6) {
                        const avg = totalSize / loaded;
                        fixedTotalSize = avg * total;
                        isSizeFixed = true;
                    }
                    if(isSizeFixed) totalStr = formatBytes(fixedTotalSize);

                    document.getElementById('sizeTxt').innerText = `${currentStr} / ${totalStr}`;
                }

                updateStatus("Birleştiriliyor...", 100);
                const finalBlob = new Blob(blobs, {type: 'video/mp4'});
                if(finalBlob.size < 500000) throw new Error("Hatalı dosya");

                const url = URL.createObjectURL(finalBlob);
                const a = document.createElement('a');
                a.href = url;
                
                let fName = selectedItem.title.replace(/[^a-z0-9]/gi, '_');
                if(selectedItem.type === 'series') {
                    const s = document.getElementById('seasonSelect');
                    const e = document.getElementById('episodeSelect');
                    fName += `_S${s.value}B${e.value}`;
                }
                a.download = fName + ".mp4";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                updateStatus("Tamamlandı", 100);
                document.getElementById('sizeTxt').innerText = formatBytes(finalBlob.size);
                document.getElementById('statusTxt').style.color = "#00ff00";
                
                btn.innerHTML = '<i class="fas fa-check"></i> BİTTİ';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                }, 4000);

            } catch(e) {
                console.error(e);
                updateStatus("HATA!", 0);
                document.getElementById('statusTxt').innerText = "Hata Oluştu";
                document.getElementById('statusTxt').style.color = "#ff4444";
                btn.disabled = false;
                btn.innerHTML = 'Tekrar Dene';
            }
        }

        function updateStatus(txt, pct) {
            document.getElementById('statusTxt').innerText = txt;
            document.getElementById('percentTxt').innerText = pct + "%";
            document.getElementById('progressBar').style.width = pct + "%";
        }

        async function parseM3u8Recursively(url) {
            const res = await fetch(url);
            if(!res.ok) throw new Error("Link hatası");
            const text = await res.text();
            const lines = text.split('\n');
            let foundUrl = "";

            if(text.includes("#EXT-X-STREAM-INF")) {
                for(let i=0; i<lines.length; i++) {
                    const line = lines[i].trim();
                    if(line.includes("#EXT-X-STREAM-INF")) {
                        for(let k=i+1; k<lines.length; k++) {
                            const next = lines[k].trim();
                            if(next && !next.startsWith("#")) {
                                foundUrl = resolveSmartUrl(url, next);
                                break;
                            }
                        }
                        if(foundUrl) break;
                    }
                }
                if(foundUrl) return await parseM3u8Recursively(foundUrl);
                
                for(let line of lines) {
                    if(line.includes(".m3u8") && !line.startsWith("#")) {
                        foundUrl = resolveSmartUrl(url, line.trim());
                        return await parseM3u8Recursively(foundUrl);
                    }
                }
                throw new Error("Alt kaynak yok");
            }

            if(text.includes("#EXTINF")) {
                let segments = [];
                for(let line of lines) {
                    line = line.trim();
                    if(line && !line.startsWith("#")) {
                        segments.push(resolveSmartUrl(url, line));
                    }
                }
                return segments;
            }
            throw new Error("Geçersiz format");
        }

        function resolveSmartUrl(base, relative) {
            if(relative.startsWith("http")) {
                if(relative.includes("workers.dev")) return relative;
                return WORKER_BASE + relative;
            }
            let b = base.substring(0, base.lastIndexOf('/')+1);
            return b + relative;
        }
    </script>
</body>
</html>
