<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Filmoloji - Gelişmiş Dizi Paneli</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="/manifest.json">
    
<script type="module">
        // 1. Firebase ve auth.js'teki fonksiyonları import et
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { doLogout, checkAuth } from './auth.js'; 

        // 2. SİZİN FIREBASE YAPILANDIRMANIZ
        const firebaseConfig = {
            apiKey: "AIzaSyBIV0-Jzy0m4OoP6YX_L6El6x5e7YmlD8Y",
            authDomain: "filmoloji-web.firebaseapp.com",
            databaseURL: "https://filmoloji-web-default-rtdb.firebaseio.com",
            projectId: "filmoloji-web",
            storageBucket: "filmoloji-web.firebasestorage.app",
            messagingSenderId: "904158206710",
            appId: "1:904158206710:web:614592033008ff6f286ad7",

        // 3. checkAuth ve doLogout'u global alana bağla
        window.checkAuth = checkAuth;

        // 4. SAYFA YÜKLENİR YÜKLENMEZ YETKİ KONTROLÜNÜ ÇALIŞTIR

        checkAuth('admin'); // SADECE ADMIN'LER GİREBİLİR
    </script>

    <script src="database.js"></script>

    <style>
        /* --- STİL AYARLARI (MEVCUT KODDAN ALINMIŞTIR) --- */
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; background: #1e1e1e; padding: 30px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        h2 { color: #E50914; text-align: center; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9rem; }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%; padding: 10px; border: 1px solid #333; border-radius: 8px;
            background: #2b2b2b; color: #e0e0e0; font-size: 1rem;
        }
        textarea { resize: vertical; min-height: 100px; }

        .btn-add, .btn-remove {
            background: #46d369; color: white; border: none; padding: 8px 15px;
            border-radius: 6px; cursor: pointer; margin-left: 10px; transition: background 0.3s;
        }
        .btn-remove { background: #E50914; }
        .btn-add:hover { background: #3fa153; }
        .btn-remove:hover { background: #c40710; }

        .btn-submit {
            width: 100%; padding: 15px; background: #E50914; color: white; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1.1rem;
            transition: background 0.3s;
        }
        .btn-submit:hover { background: #ff0f1f; }

        #seasons-container { margin-top: 20px; padding: 15px; border: 1px solid #444; border-radius: 8px; background: #222; }
        .season-box { padding: 15px; margin-top: 15px; border: 1px solid #555; border-radius: 8px; background: #2b2b2b; }
        .episodes-container { margin-top: 10px; padding-left: 20px; border-left: 2px solid #555; }
        .episode-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .episode-row input { flex: 1; }

        #status {
            display: none; background: #333; color: #46d369; padding: 15px; border-radius: 8px;
            text-align: center; margin-top: 20px; border: 1px solid #46d369;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Gelişmiş Dizi Veri Giriş Paneli</h2>
        <div id="status"></div>

        <div class="form-group">
            <label for="title">Dizi Adı:</label>
            <input type="text" id="title" required>
        </div>
        <div class="form-group">
            <label for="type">Tip:</label>
            <select id="type">
                <option value="series">Dizi</option>
                <option value="movie">Film</option>
            </select>
        </div>
        <div class="form-group">
            <label for="genre">Tür (Virgülle Ayırın):</label>
            <input type="text" id="genre" placeholder="Aksiyon, Komedi, Fantastik">
        </div>
        <div class="form-group">
            <label for="year">Yıl:</label>
            <input type="number" id="year" placeholder="2024">
        </div>
        <div class="form-group">
            <label for="imdb">IMDB Puanı:</label>
            <input type="text" id="imdb" placeholder="8.5">
        </div>
        <div class="form-group">
            <label for="poster">Poster URL:</label>
            <input type="text" id="poster">
        </div>
        <div class="form-group">
            <label for="backdrop">Arka Plan URL (Opsiyonel):</label>
            <input type="text" id="backdrop">
        </div>
        <div class="form-group">
            <label for="description">Açıklama:</label>
            <textarea id="description"></textarea>
        </div>

        <h3>Sezonlar <button class="btn-add" onclick="addSeason()">Sezon Ekle</button></h3>
        <div id="seasons-container">
            </div>

        <button class="btn-submit" onclick="addItem()">Veritabanına Ekle</button>
        <button class="btn-submit" onclick="downloadDB()" style="background: #333;">DATABASE.JS İNDİR</button>

        <a href="dashboard.html" style="display:block; text-align:center; color:#E50914; margin-top:15px; text-decoration:none;">
            <i class="fas fa-arrow-left"></i> Panele Geri Dön
        </a>
    </div>

    <script>
        /* KODUNUZUN İÇİNE EKLEYİNİZ */

// Sağ Tık Menüsünü Engelleme
document.addEventListener('contextmenu', event => {
    event.preventDefault();
    showToast("Bu içerik telif hakları ile korunmaktadır."); // Mevcut toast fonksiyonunu kullanma
});

// F12 ve Diğer Kısayolları Engelleme (Windows/Linux için)
document.onkeydown = function(e) {
    // F12 tuşu
    if (e.key === 'F12' || e.keyCode == 123) {
        event.preventDefault();
        showToast("Geliştirici araçları engellendi!");
        return false;
    }
    // Ctrl+Shift+I (Inceleme), Ctrl+Shift+J (Konsol), Ctrl+Shift+C (Öğe Seçici)
    if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) {
        event.preventDefault();
        showToast("Geliştirici araçları engellendi!");
        return false;
    }
    // Ctrl+S (Kaydet)
    if (e.ctrlKey && e.keyCode == 83) {
        event.preventDefault();
        showToast("Kaydetme işlemi engellendi!");
        return false;
    }
    // Ctrl+U (Sayfa Kaynağını Görüntüle)
    if (e.ctrlKey && e.keyCode == 85) {
        event.preventDefault();
        showToast("Sayfa kaynağına erişim engellendi!");
        return false;
    }
    // Mac kullanıcıları için cmd tuşu
    if (e.metaKey && (e.keyCode == 73 || e.keyCode == 83 || e.keyCode == 85)) {
        event.preventDefault();
        showToast("İzin verilmeyen işlem!");
        return false;
    }
};
        // database.js'ten gelen global veritabanı (varsayılan olarak boş veya mevcut veri)
        let localDB = typeof DATABASE !== 'undefined' ? [...DATABASE] : [];

        let seasonCount = 0;

        function addSeason() {
            seasonCount++;
            const container = document.getElementById('seasons-container');
            const seasonBox = document.createElement('div');
            seasonBox.className = 'season-box';
            seasonBox.id = `season_${seasonCount}`;
            
            seasonBox.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h4>${seasonCount}. Sezon <span style="font-size:0.8em; color:#aaa;" id="ep_counter_s${seasonCount}"></span></h4>
                    <input type="number" id="ep_count_s${seasonCount}" min="1" value="1" style="width:50px; text-align:center; margin-right:10px;" onchange="updateEpisodes(${seasonCount})">
                </div>
                <button class="btn-add" onclick="updateEpisodes(${seasonCount})" style="background:#555; margin-top:10px;">Bölüm Sayısını Güncelle</button>
                <div id="episodes_s${seasonCount}" class="episodes-container">
                    </div>
                <button class="btn-remove" onclick="removeSeason(${seasonCount})" style="float:right; margin-top:10px;">Sezonu Sil</button>
                <div style="clear:both;"></div>
            `;
            container.appendChild(seasonBox);
            updateEpisodes(seasonCount);
        }

        function removeSeason(s) {
            document.getElementById(`season_${s}`).remove();
        }

        function updateEpisodes(s) {
            const epCount = parseInt(document.getElementById(`ep_count_s${s}`).value) || 0;
            const container = document.getElementById(`episodes_s${s}`);
            container.innerHTML = ''; // Temizle
            
            for(let e=1; e<=epCount; e++) {
                container.innerHTML += `
                    <div class="episode-row">
                        <label style="width: 30px; line-height:36px;">E${e}:</label>
                        <input type="text" id="s${s}_e${e}_name" placeholder="Bölüm ${e} Adı (Opsiyonel)" style="flex: 2;">
                        <input type="text" id="s${s}_e${e}_url" placeholder="M3U8 URL'si" required style="flex: 4;">
                    </div>
                `;
            }
            document.getElementById(`ep_counter_s${s}`).textContent = `(${epCount} Bölüm)`;
        }

        function addItem() {
            const title = document.getElementById('title').value;
            if (!title) {
                alert("Lütfen Dizi Adını girin.");
                return;
            }

            const item = {
                id: title.toLowerCase().replace(/[^a-z0-9]/g, ''),
                type: document.getElementById('type').value,
                title: title,
                genre: document.getElementById('genre').value.split(',').map(g => g.trim()).filter(g => g),
                year: document.getElementById('year').value,
                imdb: document.getElementById('imdb').value,
                poster: document.getElementById('poster').value,
                backdrop: document.getElementById('backdrop').value,
                description: document.getElementById('description').value,
                seasons: []
            };

            // Sezonları topla
            for (let s = 1; s <= seasonCount; s++) {
                const seasonElement = document.getElementById(`season_${s}`);
                if (seasonElement) {
                    const epCount = parseInt(document.getElementById(`ep_count_s${s}`).value);
                    let episodes = [];
                    
                    for(let e=1; e<=epCount; e++) {
                        episodes.push({
                            name: document.getElementById(`s${s}_e${e}_name`).value || `Bölüm ${e}`,
                            source: document.getElementById(`s${s}_e${e}_url`).value,
                            desc: ""
                        });
                    }

                    item.seasons.push({
                        name: `${s}. Sezon`,
                        episodes: episodes
                    });
                }
            }

            localDB.push(item);
            
            const status = document.getElementById('status');
            status.style.display = 'block';
            status.innerHTML = `✅ "${item.title}" başarıyla eklendi!<br>Şimdi "DATABASE.JS İNDİR" butonuna bas.`;

            // Formu temizle
            document.getElementById('title').value = '';
            document.getElementById('genre').value = '';
            document.getElementById('year').value = '';
            document.getElementById('imdb').value = '';
            document.getElementById('poster').value = '';
            document.getElementById('backdrop').value = '';
            document.getElementById('description').value = '';
            document.getElementById('seasons-container').innerHTML = '';
            seasonCount = 0;
        }

        function downloadDB() {
            const content = "const DATABASE = " + JSON.stringify(localDB, null, 4) + ";";
            const blob = new Blob([content], {type: "text/javascript"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "database.js";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>

</body>
</html>
