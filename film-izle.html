<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINEO. | İzleniyor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --accent: #fff; --grey: #111; }
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Üst Menü */
        .nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); position: absolute; width: 100%; top: 0; z-index: 100; transition: opacity 0.3s; }
        .logo { font-size: 24px; font-weight: 900; letter-spacing: -2px; color: #fff; text-decoration: none; }
        .btn-back { color: #fff; text-decoration: none; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; opacity: 0.8; transition: 0.3s; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 30px; backdrop-filter: blur(5px); }
        .btn-back:hover { opacity: 1; background: rgba(255,255,255,0.2); }

        /* Oynatıcı Alanı */
        .player-section { width: 100%; min-height: 100vh; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 80px; padding-bottom: 50px; }
        
        .video-wrapper { position: relative; width: 100%; max-width: 1200px; aspect-ratio: 16 / 9; background: #050505; box-shadow: 0 20px 50px rgba(0,0,0,0.9); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 10; background: #000; }

        /* Gelişmiş Sunucu Paneli */
        .servers-container { max-width: 1200px; width: 100%; margin-top: 20px; background: #0a0a0a; border: 1px solid #1a1a1a; border-radius: 12px; padding: 20px; }
        .servers-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .servers-title { font-size: 14px; font-weight: 800; color: #aaa; display: flex; align-items: center; gap: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .servers-status { font-size: 12px; color: #00ff88; font-weight: 700; background: rgba(0,255,136,0.1); padding: 4px 10px; border-radius: 20px; }

        .servers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        .server-btn { background: #111; border: 1px solid #222; color: #888; padding: 12px 15px; border-radius: 8px; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: space-between; }
        .server-btn:hover { background: #1a1a1a; color: #ddd; border-color: #333; transform: translateY(-2px); }
        .server-btn.active { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .server-btn i { font-size: 14px; opacity: 0.7; }
        .server-btn.active i { color: #000; opacity: 1; }

        /* Film Bilgileri */
        .movie-info { max-width: 1200px; margin: 0 auto; padding: 20px 0; display: flex; justify-content: space-between; align-items: flex-start; gap: 30px; width: 100%; }
        .info-left { flex: 1; }
        .info-title { font-size: 28px; font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; }
        .info-meta { color: #666; font-size: 13px; font-weight: 700; margin-bottom: 15px; display: flex; gap: 15px; }
        .info-plot { font-size: 14px; line-height: 1.6; color: #aaa; max-width: 800px; }

        #error-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff4d4d; font-weight: bold; text-align: center; display: none; z-index: 1; }

        @media (max-width: 768px) {
            .video-wrapper { border-radius: 0; }
            .servers-container { padding: 15px 10px; border-radius: 0; border-left: none; border-right: none; }
            .servers-grid { grid-template-columns: repeat(2, 1fr); }
            .movie-info { flex-direction: column; padding: 20px 15px; }
        }
    </style>
</head>
<body>

    <nav class="nav" id="top-nav">
        <a href="javascript:history.back()" class="btn-back"><i class="fas fa-arrow-left"></i> Sisteme Dön</a>
        <a href="index.html" class="logo">SINEO.</a>
        <div style="width: 100px;"></div>
    </nav>

    <div class="player-section">
        <div class="video-wrapper">
            <div id="error-msg">Medya yüklenemedi. Alternatif sunucu seçin.</div>
            
            <iframe id="video-player" frameborder="0" scrolling="no" allowfullscreen="allowfullscreen" webkitallowfullscreen="true" mozallowfullscreen="true" msallowfullscreen="true" oallowfullscreen="true" allow="autoplay; fullscreen; picture-in-picture; encrypted-media"></iframe>
            
        </div>
        
        <div class="servers-container" id="server-panel" style="display: none;">
            <div class="servers-header">
                <div class="servers-title"><i class="fas fa-satellite-dish"></i> Alternatif Kaynaklar</div>
                <div class="servers-status"><i class="fas fa-circle" style="font-size: 8px;"></i> Sistem Aktif</div>
            </div>
            <div class="servers-grid" id="servers-grid">
                </div>
        </div>

        <div class="movie-info">
            <div class="info-left">
                <h1 class="info-title" id="m-title">Yükleniyor...</h1>
                <div class="info-meta">
                    <span id="m-year">--</span>
                    <span>•</span>
                    <span id="m-runtime">--</span>
                    <span>•</span>
                    <span style="color: #f5c518;"><i class="fas fa-star"></i> <span id="m-rating">--</span> IMDb</span>
                </div>
                <p class="info-plot" id="m-plot">İçerik bilgileri sunucudan çekiliyor...</p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'f709a1ae'; 
        const urlParams = new URLSearchParams(window.location.search);
        const movieID = urlParams.get('id');

        const servers = [
            { id: 1, name: "VidSrc.me", tag: "Önerilen", icon: "fa-play-circle", url: `https://vidsrc.me/embed/movie?imdb=${movieID}` },
            { id: 2, name: "VidLink", tag: "Hızlı", icon: "fa-bolt", url: `https://vidlink.pro/movie/${movieID}` },
            { id: 3, name: "AutoEmbed", tag: "Stabil", icon: "fa-shield-alt", url: `https://autoembed.to/movie/imdb/${movieID}` },
            { id: 4, name: "MultiEmbed", tag: "Yedek 1", icon: "fa-server", url: `https://multiembed.mov/?video_id=${movieID}` },
            { id: 5, name: "VidSrc.to", tag: "Yedek 2", icon: "fa-cloud", url: `https://vidsrc.to/embed/movie/${movieID}` },
            { id: 6, name: "VidSrc.cc", tag: "Yedek 3", icon: "fa-database", url: `https://vidsrc.cc/v2/embed/movie/${movieID}` },
            { id: 7, name: "VidSrc.pro", tag: "Yedek 4", icon: "fa-hdd", url: `https://vidsrc.pro/embed/movie/${movieID}` },
            { id: 8, name: "Smashy", tag: "Alternatif", icon: "fa-tv", url: `https://embed.smashystream.com/playere.php?imdb=${movieID}` },
            { id: 9, name: "2Embed", tag: "Eski Ağ", icon: "fa-archive", url: `https://www.2embed.cc/embed/${movieID}` },
            { id: 10, name: "Eja TV", tag: "Mobil", icon: "fa-mobile-alt", url: `https://eja.tv/?movie=${movieID}` }
        ];

        async function initPage() {
            if (!movieID) {
                document.getElementById('error-msg').style.display = 'block';
                return;
            }

            const grid = document.getElementById('servers-grid');
            servers.forEach((srv, index) => {
                const isActive = index === 0 ? 'active' : '';
                grid.innerHTML += `
                    <button class="server-btn ${isActive}" onclick="changeServer('${srv.url}', this)">
                        <span><i class="fas ${srv.icon}" style="margin-right: 8px;"></i> ${srv.name}</span>
                        <span style="font-size: 10px; opacity: 0.5;">${srv.tag}</span>
                    </button>
                `;
            });
            
            document.getElementById('server-panel').style.display = 'block';
            document.getElementById('video-player').src = servers[0].url;

            try {
                const response = await fetch(`https://www.omdbapi.com/?i=${movieID}&plot=full&apikey=${API_KEY}`);
                const data = await response.json();

                if (data.Response === "True") {
                    document.getElementById('m-title').innerText = data.Title;
                    document.getElementById('m-year').innerText = data.Year;
                    document.getElementById('m-runtime').innerText = data.Runtime;
                    document.getElementById('m-rating').innerText = data.imdbRating;
                    document.getElementById('m-plot').innerText = data.Plot !== "N/A" ? data.Plot : "Bu içerik için özet bulunmuyor.";
                }
            } catch (err) {}
        }

        window.changeServer = function(url, btnElement) {
            if (!movieID) return;
            document.getElementById('video-player').src = url;
            const buttons = document.querySelectorAll('.server-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        };

        initPage();
    </script>
</body>
</html>
