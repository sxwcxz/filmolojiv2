<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SINEO. | Premium Animeler</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        /* --- 1. TEMA VE RENKLER --- */
        :root {
            --brand-accent: #ffffff; 
            --btn-text-on-accent: #000000; 
            --bg: #050505;
            --surface: #111111;
            --surface-hover: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --glass: rgba(15, 15, 15, 0.75);
            --glass-border: rgba(255, 255, 255, 0.15);
            --blur: blur(30px);
            --pill-active-bg: #ffffff;
            --pill-active-text: #000000;
        }

        [data-theme="light"] {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --surface-hover: #e5e5e7;
            --text-primary: #111111;
            --text-secondary: #666666;
            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.1);
            --pill-active-bg: #000000;
            --pill-active-text: #ffffff;
            --brand-accent: #000000;
            --btn-text-on-accent: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; transition: background-color 0.3s, color 0.2s; }
        body { background-color: var(--bg); color: var(--text-primary); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- PRELOADER --- */
        #preloader { position: fixed; inset: 0; background: var(--bg); z-index: 999999; display: flex; align-items: center; justify-content: center; flex-direction: column; transition: opacity 0.5s ease; }
        .loader-logo { font-size: 60px; font-weight: 900; letter-spacing: -3px; margin-bottom: 20px; animation: pulse 1.5s infinite alternate; }
        .loading-bar-container { width: 200px; height: 4px; background: var(--glass-border); border-radius: 10px; overflow: hidden; }
        .loading-bar { height: 100%; width: 0%; background: var(--brand-accent); transition: width 0.3s ease; }
        @keyframes pulse { from { opacity: 0.7; transform: scale(0.98); } to { opacity: 1; transform: scale(1.02); } }

        /* --- PILL NAVBAR --- */
        .navbar-wrapper { position: fixed; top: 20px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000; }
        .pill-nav { background: var(--glass); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border: 1px solid var(--glass-border); border-radius: 50px; display: flex; align-items: center; padding: 6px 10px; gap: 5px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); }
        .nav-item { display: flex; align-items: center; gap: 8px; padding: 10px 22px; border-radius: 40px; color: var(--text-primary); text-decoration: none; font-size: 15px; font-weight: 600; cursor: pointer; opacity: 0.7; }
        .nav-item:hover { opacity: 1; background: var(--surface); }
        .nav-item.active { background: var(--pill-active-bg); color: var(--pill-active-text); opacity: 1; }
        .nav-divider { width: 1px; height: 20px; background: var(--glass-border); margin: 0 5px; }
        .nav-icon-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-primary); cursor: pointer; opacity: 0.7; font-size: 18px; background: transparent; border: none; transition: 0.3s; }
        .nav-icon-btn:hover { background: var(--surface); opacity: 1; }

        /* --- HERO --- */
        .hero { position: relative; height: 85vh; display: flex; align-items: flex-end; padding-bottom: 80px; overflow: hidden; background: #000; }
        .hero-poster { position: absolute; inset: 0; background-size: cover; background-position: center top; z-index: 0; opacity: 0.5; transition: 1.5s; filter: blur(5px); }
        .hero-video-wrapper { position: absolute; top: 50%; left: 50%; width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; transform: translate(-50%, -50%) scale(1.35); z-index: 1; pointer-events: none; opacity: 0; transition: 1.5s; mask-image: linear-gradient(to top, transparent 0%, black 70%); }
        .hero-video-wrapper iframe { width: 100%; height: 100%; border: none; }
        .hero-gradient { position: absolute; inset: 0; background: linear-gradient(to right, rgba(0,0,0,0.95) 0%, transparent 70%), linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 40%); z-index: 2; pointer-events: none; }
        .hero-content { position: relative; z-index: 10; padding: 0 5%; max-width: 850px; }
        .hero-title { font-size: clamp(3rem, 7vw, 5.5rem); font-weight: 900; letter-spacing: -2px; color: #fff; text-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .hero-buttons { display: flex; gap: 15px; margin-top: 25px; }
        .btn-play { background: #fff; color: #000; border: none; padding: 14px 35px; border-radius: 30px; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-list { background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 14px 35px; border-radius: 30px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-list.added { background: #fff; color: #000; }

        /* --- CONTENT ROWS --- */
        .main-content { position: relative; z-index: 20; margin-top: -60px; padding-bottom: 60px; }
        .row-container { margin-bottom: 40px; padding: 0 5%; position: relative; }
        .row-title { font-size: 1.4rem; font-weight: 700; color: var(--text-primary); margin-bottom: 15px; }
        .slider-wrapper { position: relative; }
        .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 45px; height: 45px; border-radius: 50%; background: rgba(0,0,0,0.6); color: white; border: 1px solid var(--glass-border); cursor: pointer; z-index: 15; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; font-size: 18px; }
        .row-container:hover .slider-btn { opacity: 1; }
        .slider-btn:hover { background: var(--brand-accent); color: var(--btn-text-on-accent); }
        .scroll-wrapper { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; scrollbar-width: none; scroll-behavior: smooth; cursor: grab; }
        .scroll-wrapper::-webkit-scrollbar { display: none; }
        .scroll-wrapper:active { cursor: grabbing; }

        /* --- CARD --- */
        .card { flex: 0 0 auto; width: 200px; cursor: pointer; position: relative; transition: 0.3s; }
        .card:hover { transform: translateY(-10px); z-index: 10; }
        .poster { width: 100%; height: 300px; border-radius: 12px; overflow: hidden; background: var(--surface); border: 1px solid var(--glass-border); position: relative; }
        .poster img { width: 100%; height: 100%; object-fit: cover; }
        .card-add-btn { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.6); color: white; display: flex; align-items: center; justify-content: center; z-index: 5; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; backdrop-filter: blur(5px); }
        .card-add-btn:hover { transform: scale(1.1); background: #fff; color: #000; }
        .card-add-btn.added { background: #fff; color: #000; }
        .card-rating { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #fff; font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 6px; z-index: 5; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1); }
        .card-title { margin-top: 12px; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-primary); }

        /* --- OVERLAYS --- */
        .overlay-menu { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(25px); z-index: 2000; display: none; padding: 60px 5%; overflow-y: auto; }
        .overlay-menu.active { display: flex; flex-direction: column; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px 15px; width: 100%; max-width: 1400px; margin: 0 auto; }
        .close-overlay { position: fixed; top: 30px; right: 5%; background: white; color: black; border: none; padding: 10px 25px; border-radius: 30px; font-weight: 800; cursor: pointer; z-index: 2100; transition: 0.3s; }
        .close-overlay:hover { background: #ccc; }
        .empty-list-msg { color: var(--text-secondary); text-align: center; width: 100%; font-size: 1.2rem; padding: 50px 0; grid-column: 1 / -1; }
    </style>
</head>
<body>

    <div id="preloader">
        <div class="loader-logo">SINEO.</div>
        <div class="loading-bar-container"><div class="loading-bar" id="loading-bar"></div></div>
    </div>

    <div class="navbar-wrapper">
        <nav class="pill-nav">
            <a href="index.html" class="nav-item"><i class="fas fa-home"></i> Ana Sayfa</a>
            <a href="filmler.html" class="nav-item"><i class="fas fa-film"></i> Filmler</a>
            <a href="diziler.html" class="nav-item"><i class="fas fa-tv"></i> Diziler</a>
            <a href="animeler.html" class="nav-item active"><i class="fas fa-dragon"></i> Animeler</a>
            <div class="nav-divider"></div>
            <a href="#" class="nav-item" onclick="openMyList()"><i class="fas fa-list"></i> Listem</a>
            <div class="nav-divider"></div>
            <button class="nav-icon-btn" onclick="openSearch()"><i class="fas fa-search"></i></button>
            <button class="nav-icon-btn" id="theme-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
            <button class="nav-icon-btn" onclick="location.href='auth.html'">
                <i class="fas fa-user-circle"></i>
            </button>
        </nav>
    </div>

    <div id="search-overlay" class="overlay-menu">
        <button class="close-overlay" onclick="closeSearch()">Kapat</button>
        <input type="text" id="searchInput" placeholder="Anime ara..." onkeyup="handleSearch(event)" style="width: 80%; max-width:800px; margin: 0 auto 50px; padding: 20px; background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 20px; font-size: 22px; text-align: center; align-self: center;">
        <div class="grid-container" id="search-grid"></div>
    </div>

    <div id="list-overlay" class="overlay-menu">
        <button class="close-overlay" onclick="closeMyList()">Kapat</button>
        <h2 style="text-align:center; color:white; margin-bottom:50px; font-size: 2.5rem; font-weight: 900;">İzleme Listem</h2>
        <div class="grid-container" id="list-grid"></div>
    </div>

    <div class="hero">
        <div class="hero-poster" id="hero-poster"></div>
        <div class="hero-video-wrapper" id="hero-video-wrapper"><div id="yt-player"></div></div>
        <div class="hero-gradient"></div>
        <div class="hero-content">
            <h1 class="hero-title" id="hero-title">Yükleniyor...</h1>
            <div class="hero-meta">
                <span class="hero-imdb"><i class="fas fa-star" style="color:#f5c518"></i> <span id="hero-rating">--</span></span>
                <span id="hero-year">--</span>
                <span id="hero-genre">--</span>
            </div>
            <p id="hero-desc" style="opacity:0.8; max-width:650px; line-height:1.6; margin-top:10px;">...</p>
            <div class="hero-buttons">
                <button class="btn-play" id="hero-play"><i class="fas fa-play"></i> Oynat</button>
                <button class="btn-list" id="hero-list-btn"><i class="fas fa-plus"></i> Listeme Ekle</button>
            </div>
        </div>
    </div>

    <div class="main-content" id="content-rows"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyBoBncXwy7XkVVFyl3apBkVZOKljEu52ng",
            authDomain: "sineo-app.firebaseapp.com",
            projectId: "sineo-app",
            storageBucket: "sineo-app.firebasestorage.app",
            messagingSenderId: "646631390711",
            appId: "1:646631390711:web:58b7048964b2aa6e6742f2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const API_KEY = 'f709a1ae';
        const CORS = 'https://mac.filmolojilive.workers.dev/';

        let currentUser = null;
        let userList = []; 
        let isGuest = true;

        // TEMA MOTORU
        window.applyTheme = function(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            const icon = document.querySelector('#theme-btn i');
            if(icon) icon.className = theme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('sineo_theme', theme);
        }
        window.toggleTheme = function() {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            window.applyTheme(current === 'dark' ? 'light' : 'dark');
        }
        window.applyTheme(localStorage.getItem('sineo_theme') || 'dark');

        // HERO ANİMELERİ (Type eklendi)
        const heroAnimes = [
            { imdbID: 'tt2560140', ytID: 'MGRm4IzK1SQ', trTitle: 'Attack on Titan', trGenre: 'Aksiyon / Dram', trPlot: 'İnsanlığın devlere karşı verdiği son büyük hayatta kalma savaşı.', type: 'series' },
            { imdbID: 'tt12343534', ytID: 'hHBoH6XW_Ew', trTitle: 'Jujutsu Kaisen', trGenre: 'Doğaüstü', trPlot: 'Lanetlerle dolu bir dünyada büyücülerin amansız mücadelesi.', type: 'series' },
            { imdbID: 'tt11032374', ytID: 'VQGCKyvzIM4', trTitle: 'Demon Slayer', trGenre: 'Aksiyon', trPlot: 'Tanjiro\'nun iblislere karşı verdiği intikam hikayesi.', type: 'series' }
        ];

        let shuffled = [...heroAnimes].sort(() => 0.5 - Math.random());
        let currentIdx = 0;
        let ytPlayer;

        const categories = [
            { title: 'Şu An Popüler', q: '2024 anime' },
            { title: 'Shonen Efsaneleri', q: 'naruto' },
            { title: 'Aksiyon & Dövüş', q: 'dragon ball' },
            { title: 'Ghibli Dünyası', q: 'ghibli' },
            { title: 'Karanlık & Psikolojik', q: 'death note' },
            { title: 'Romantik Animeler', q: 'your name' },
            { title: 'Bilim Kurgu', q: 'evangelion' },
            { title: 'Fantastik', q: 'hunter x hunter' }
        ];

        window.getHD = function(url) { return (url && url !== "N/A") ? url.replace('SX300', 'SX1080') : ""; }

        // --- AUTH & INITIALIZE ---
        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            if (user) {
                isGuest = false;
                try {
                    const docSnap = await getDoc(doc(db, "users", user.uid));
                    if (docSnap.exists()) {
                        userList = docSnap.data().watched || [];
                    } else {
                        userList = [];
                    }
                } catch(e) {
                    console.error("Veri okuma hatası:", e);
                    userList = [];
                }
            } else {
                isGuest = true;
                const localData = localStorage.getItem('sineo_guest_list');
                userList = localData ? JSON.parse(localData) : [];
            }
            init();
        });

        window.isSaved = function(imdbID) {
            return userList.some(item => item.imdbID === imdbID);
        }

        // --- GÜVENLİ LİSTEYE EKLEME ---
        window.toggleSave = async function(imdbID, encodedTitle, year, encodedPoster, rating, type, btnElement, isHero = false) {
            const title = decodeURIComponent(encodedTitle);
            const poster = decodeURIComponent(encodedPoster);
            const index = userList.findIndex(m => m.imdbID === imdbID);

            if (index > -1) {
                userList.splice(index, 1);
                btnElement.classList.remove('added');
                btnElement.innerHTML = isHero ? '<i class="fas fa-plus"></i> Listeme Ekle' : '<i class="fas fa-plus"></i>';
            } else {
                userList.push({ imdbID, title, year, poster, rating, type: type || 'movie' });
                btnElement.classList.add('added');
                btnElement.innerHTML = isHero ? '<i class="fas fa-check"></i> Listeye Eklendi' : '<i class="fas fa-check"></i>';
            }
            
            if (isGuest) {
                localStorage.setItem('sineo_guest_list', JSON.stringify(userList));
                if(document.getElementById('list-overlay').classList.contains('active')) window.renderMyList(); 
            } else {
                try {
                    await setDoc(doc(db, "users", currentUser.uid), { watched: userList }, { merge: true });
                    if(document.getElementById('list-overlay').classList.contains('active')) window.renderMyList(); 
                } catch (error) { console.error("Kritik hata:", error); }
            }
        }

        window.hidePreloader = function() { 
            const pre = document.getElementById('preloader');
            if(pre) { pre.style.opacity = '0'; setTimeout(() => pre.style.display = 'none', 500); }
        }

        window.loadHero = async function(obj) {
            try {
                const res = await fetch(`https://www.omdbapi.com/?i=${obj.imdbID}&apikey=${API_KEY}`).then(r => r.json());
                document.getElementById('hero-title').innerText = obj.trTitle;
                document.getElementById('hero-desc').innerText = obj.trPlot;
                document.getElementById('hero-poster').style.backgroundImage = `url('${CORS}${window.getHD(res.Poster)}')`;
                document.getElementById('hero-rating').innerText = res.imdbRating || '8.8';
                document.getElementById('hero-year').innerText = res.Year;
                document.getElementById('hero-genre').innerText = obj.trGenre;
                
                // Dizi / Film Kontrolü
                const targetPage = (obj.type === 'series') ? 'dizi-detay.html' : 'film-detay.html';
                document.getElementById('hero-play').onclick = () => location.href = `${targetPage}?id=${obj.imdbID}`;
                
                const btn = document.getElementById('hero-list-btn');
                btn.className = window.isSaved(obj.imdbID) ? 'btn-list added' : 'btn-list';
                btn.innerHTML = window.isSaved(obj.imdbID) ? '<i class="fas fa-check"></i> Listeye Eklendi' : '<i class="fas fa-plus"></i> Listeme Ekle';
                
                btn.onclick = () => window.toggleSave(
                    obj.imdbID, encodeURIComponent(obj.trTitle), res.Year, encodeURIComponent(res.Poster), (res.imdbRating || '8.8'), obj.type, btn, true
                );
            } catch(e) {}
        }

        // YOUTUBE API 
        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-player', {
                videoId: shuffled[currentIdx].ytID,
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': shuffled[currentIdx].ytID, 'start': 3, 'vq': 'hd1080' },
                events: {
                    'onStateChange': (e) => { if(e.data === 1) { document.getElementById('hero-video-wrapper').style.opacity = '1'; document.getElementById('hero-poster').style.opacity = '0.3'; window.hidePreloader(); } },
                    'onError': () => { currentIdx++; if(shuffled[currentIdx]) { window.loadHero(shuffled[currentIdx]); ytPlayer.loadVideoById(shuffled[currentIdx].ytID); } else { window.hidePreloader(); } }
                }
            });
        }

        async function init() {
            const bar = document.getElementById('loading-bar');
            setTimeout(window.hidePreloader, 6000); 
            await window.loadHero(shuffled[0]);
            
            if (typeof YT !== 'undefined' && YT.Player) window.onYouTubeIframeAPIReady();

            bar.style.width = "20%";
            for (let i = 0; i < categories.length; i++) {
                await fetchAndRenderRow(categories[i]);
                bar.style.width = (20 + ((i + 1) * 10)) + "%";
            }
            bar.style.width = "100%";
        }

        async function fetchAndRenderRow(cat) {
            const container = document.getElementById('content-rows');
            const rowId = `row-${cat.q.replace(/\s+/g, '')}`;
            container.innerHTML += `<div class="row-container"><h2 class="row-title">${cat.title}</h2><div class="slider-wrapper"><button class="slider-btn left" style="left:-15px" onclick="document.getElementById('${rowId}').scrollBy({left:-600, behavior:'smooth'})"><i class="fas fa-chevron-left"></i></button><div class="scroll-wrapper" id="${rowId}"></div><button class="slider-btn right" style="right:-15px" onclick="document.getElementById('${rowId}').scrollBy({left:600, behavior:'smooth'})"><i class="fas fa-chevron-right"></i></button></div></div>`;
            
            const res1 = await fetch(`https://www.omdbapi.com/?s=${cat.q}&page=1&apikey=${API_KEY}`).then(r => r.json());
            const res2 = await fetch(`https://www.omdbapi.com/?s=${cat.q}&page=2&apikey=${API_KEY}`).then(r => r.json());
            let combined = [...(res1.Search || []), ...(res2.Search || [])];

            const wrapper = document.getElementById(rowId);
            combined.forEach(m => {
                if(m.Poster && m.Poster !== "N/A") {
                    const rating = '8.5'; // Anime serilerinde mock puan kullanıyoruz
                    const addedClass = window.isSaved(m.imdbID) ? 'added' : '';
                    const iconHtml = window.isSaved(m.imdbID) ? '<i class="fas fa-check"></i>' : '<i class="fas fa-plus"></i>';
                    
                    const targetPage = (m.Type === 'series') ? 'dizi-detay.html' : 'film-detay.html';
                    const itemType = m.Type || 'movie';
                    
                    const encTitle = encodeURIComponent(m.Title);
                    const encPoster = encodeURIComponent(m.Poster);

                    wrapper.innerHTML += `
                        <div class="card" onclick="location.href='${targetPage}?id=${m.imdbID}'">
                            <div class="card-rating"><i class="fas fa-star"></i> ${rating}</div>
                            <div class="card-add-btn ${addedClass}" onclick="event.stopPropagation(); window.toggleSave('${m.imdbID}', '${encTitle}', '${m.Year}', '${encPoster}', '${rating}', '${itemType}', this)">${iconHtml}</div>
                            <div class="poster"><img src="${CORS}${window.getHD(m.Poster)}" onerror="this.closest('.card').remove()"></div>
                            <div class="card-title">${m.Title}</div>
                        </div>`;
                }
            });
            enableDragScroll(wrapper);
        }

        // MENÜLER
        window.openMyList = function() { 
            document.getElementById('list-overlay').classList.add('active'); 
            document.body.style.overflow = 'hidden';
            window.renderMyList(); 
        }
        window.closeMyList = function() { 
            document.getElementById('list-overlay').classList.remove('active'); 
            document.body.style.overflow = 'auto';
            location.reload();
        }

        window.renderMyList = function() {
            const grid = document.getElementById('list-grid');
            grid.innerHTML = '';
            
            if(userList.length === 0) {
                grid.innerHTML = '<div class="empty-list-msg">Listeniz şu an boş. Eklemeye başlayın.</div>';
                return;
            }

            userList.forEach(m => {
                const targetPage = (m.type === 'series') ? 'dizi-detay.html' : 'film-detay.html';
                const encTitle = encodeURIComponent(m.title);
                const encPoster = encodeURIComponent(m.poster);
                
                grid.innerHTML += `
                    <div class="card" style="width:100%;" onclick="location.href='${targetPage}?id=${m.imdbID}'">
                        <div class="card-rating"><i class="fas fa-star"></i> ${m.rating}</div>
                        <div class="card-add-btn added" onclick="event.stopPropagation(); window.toggleSave('${m.imdbID}', '${encTitle}', '${m.year}', '${encPoster}', '${m.rating}', '${m.type}', this)"><i class="fas fa-check"></i></div>
                        <div class="poster"><img src="${CORS}${window.getHD(m.poster)}" onerror="this.closest('.card').remove()"></div>
                        <div class="card-title">${m.title}</div>
                        <div class="card-meta">${m.year || ''}</div>
                    </div>`;
            });
        }

        window.openSearch = function() { document.getElementById('search-overlay').classList.add('active'); document.body.style.overflow = 'hidden'; setTimeout(() => document.getElementById('searchInput').focus(), 100); }
        window.closeSearch = function() { document.getElementById('search-overlay').classList.remove('active'); document.body.style.overflow = 'auto'; }

        let searchTimer;
        window.handleSearch = async function(e) {
            clearTimeout(searchTimer);
            const q = e.target.value;
            const grid = document.getElementById('search-grid');
            if(q.length > 2) {
                searchTimer = setTimeout(async () => {
                    grid.innerHTML = '<p style="color:white; text-align:center; grid-column:1/-1;">Aranıyor...</p>';
                    const res = await fetch(`https://www.omdbapi.com/?s=${q}&apikey=${API_KEY}`).then(r => r.json());
                    grid.innerHTML = '';
                    if(res.Search) {
                        res.Search.forEach(m => {
                            if(m.Poster && m.Poster !== "N/A") {
                                const rating = '8.5';
                                const addedClass = window.isSaved(m.imdbID) ? 'added' : '';
                                const iconHtml = window.isSaved(m.imdbID) ? '<i class="fas fa-check"></i>' : '<i class="fas fa-plus"></i>';
                                
                                const targetPage = (m.Type === 'series') ? 'dizi-detay.html' : 'film-detay.html';
                                const itemType = m.Type || 'movie';

                                const encTitle = encodeURIComponent(m.Title);
                                const encPoster = encodeURIComponent(m.Poster);

                                grid.innerHTML += `
                                    <div class="card" style="width:100%;" onclick="location.href='${targetPage}?id=${m.imdbID}'">
                                        <div class="card-rating"><i class="fas fa-star"></i> ${rating}</div>
                                        <div class="card-add-btn ${addedClass}" onclick="event.stopPropagation(); window.toggleSave('${m.imdbID}', '${encTitle}', '${m.Year}', '${encPoster}', '${rating}', '${itemType}', this)">${iconHtml}</div>
                                        <div class="poster"><img src="${CORS}${window.getHD(m.Poster)}" onerror="this.closest('.card').remove()"></div>
                                        <div class="card-title">${m.Title}</div>
                                    </div>`;
                            }
                        });
                    }
                }, 500);
            } else { grid.innerHTML = ''; }
        }

        // Fare ile yatay kaydırma fonksiyonu
        function enableDragScroll(el) {
            let isDown = false; let startX; let scrollLeft;
            el.addEventListener('mousedown', (e) => { isDown = true; startX = e.pageX - el.offsetLeft; scrollLeft = el.scrollLeft; el.style.cursor = 'grabbing'; });
            el.addEventListener('mouseleave', () => { isDown = false; el.style.cursor = 'grab'; });
            el.addEventListener('mouseup', () => { isDown = false; el.style.cursor = 'grab'; });
            el.addEventListener('mousemove', (e) => { if(!isDown) return; e.preventDefault(); const x = e.pageX - el.offsetLeft; const walk = (x - startX) * 2; el.scrollLeft = scrollLeft - walk; });
        }
    </script>
</body>
</html>
