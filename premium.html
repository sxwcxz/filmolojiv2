    <script>
        /* KODUNUZUN İÇİNE EKLEYİNİZ */

// Sağ Tık Menüsünü Engelleme
document.addEventListener('contextmenu', event => {
    event.preventDefault();
    showToast("Bu içerik telif hakları ile korunmaktadır."); // Mevcut toast fonksiyonunu kullanma
});

// F12 ve Diğer Kısayolları Engelleme (Windows/Linux için)
document.onkeydown = function(e) {
    // F12 tuşu
    if (e.key === 'F12' || e.keyCode == 123) {
        event.preventDefault();
        showToast("Geliştirici araçları engellendi!");
        return false;
    }
    // Ctrl+Shift+I (Inceleme), Ctrl+Shift+J (Konsol), Ctrl+Shift+C (Öğe Seçici)
    if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) {
        event.preventDefault();
        showToast("Geliştirici araçları engellendi!");
        return false;
    }
    // Ctrl+S (Kaydet)
    if (e.ctrlKey && e.keyCode == 83) {
        event.preventDefault();
        showToast("Kaydetme işlemi engellendi!");
        return false;
    }
    // Ctrl+U (Sayfa Kaynağını Görüntüle)
    if (e.ctrlKey && e.keyCode == 85) {
        event.preventDefault();
        showToast("Sayfa kaynağına erişim engellendi!");
        return false;
    }
    // Mac kullanıcıları için cmd tuşu
    if (e.metaKey && (e.keyCode == 73 || e.keyCode == 83 || e.keyCode == 85)) {
        event.preventDefault();
        showToast("İzin verilmeyen işlem!");
        return false;
    }
};
// Service Worker Kaydı
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
            .then(registration => {
                console.log('PWA ServiceWorker kaydı başarılı.');
            })
            .catch(err => {
                console.log('PWA ServiceWorker kaydı başarısız:', err);
            });
    });
}
</script>
    <style>
        body {
            background-color: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);

        .card-grid { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; max-width: 800px; margin: 0 auto; }
        
        .card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            width: 180px; height: 180px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; text-decoration: none; color: white;
        }
        .card:hover {
            background: rgba(229, 9, 20, 0.1); border-color: #E50914;
            transform: translateY(-10px); box-shadow: 0 10px 30px rgba(229, 9, 20, 0.2);
        }
        
        .card i { font-size: 3.5rem; margin-bottom: 15px; color: #ddd; transition: 0.3s; }

        .card span { font-weight: 600; font-size: 1rem; }

        .logout-btn {

        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
