<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap - Filmoloji</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="auth.js"></script>

    <style>
        /* TASARIM KODLARI AYNI KALDI - KOPYALA YAPIŞTIR */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        body { background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .bg-wrapper { position: absolute; inset: 0; z-index: 0; background-image: url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bcae-07a3f8dc141a/f6d7434e-d6de-4185-a6d4-c77a2d08737b/TR-en-20220502-popsignuptwoweeks-perspective_alpha_website_medium.jpg'); background-size: cover; background-position: center; filter: blur(6px) brightness(0.6); transform: scale(1.05); }
        .overlay { position: absolute; inset: 0; z-index: 1; background: radial-gradient(circle, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%); }
        .login-card { position: relative; z-index: 10; width: 90%; max-width: 400px; padding: 45px 35px; background: rgba(20, 20, 20, 0.65); backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; text-align: center; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5); animation: floatUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .logo { font-family: 'Arial Black', sans-serif; font-size: 2.2rem; color: #E50914; letter-spacing: -1px; margin-bottom: 10px; text-shadow: 0 0 20px rgba(229, 9, 20, 0.6); display: inline-block; }
        h2 { color: rgba(255, 255, 255, 0.8); font-size: 1rem; font-weight: 500; margin-bottom: 35px; letter-spacing: 0.5px; }
        .input-group { position: relative; margin-bottom: 20px; }
        .custom-input { width: 100%; padding: 16px 20px; padding-right: 45px; border-radius: 14px; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0, 0, 0, 0.4); color: white; font-size: 1rem; transition: all 0.3s ease; }
        .custom-input::placeholder { color: rgba(255, 255, 255, 0.4); }
        .custom-input:focus { background: rgba(0, 0, 0, 0.6); border-color: #E50914; box-shadow: 0 0 0 4px rgba(229, 9, 20, 0.15); }
        .input-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3); font-size: 1.1rem; transition: 0.3s; }
        .custom-input:focus + .input-icon { color: #E50914; }
        .btn-submit { width: 100%; padding: 16px; border-radius: 14px; border: none; background: #E50914; color: white; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 5px 20px rgba(229, 9, 20, 0.3); }
        .btn-submit:hover { background: #ff0a16; transform: scale(1.02); box-shadow: 0 10px 30px rgba(229, 9, 20, 0.5); }
        .btn-submit:active { transform: scale(0.98); }
        .error-text { color: #ff4d4d; font-size: 0.85rem; margin-top: 15px; min-height: 20px; opacity: 0; transition: 0.3s; font-weight: 600; }
        .error-text.visible { opacity: 1; }
        .back-link { display: inline-block; margin-top: 25px; color: rgba(255, 255, 255, 0.5); text-decoration: none; font-size: 0.85rem; transition: 0.3s; padding: 5px 10px; border-radius: 8px; }
        .back-link:hover { color: white; background: rgba(255,255,255,0.1); }
        @keyframes floatUp { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; border-color: #ff4d4d !important; }
        @keyframes shake { 10%, 90% { transform: translateX(-1px); } 20%, 80% { transform: translateX(2px); } 30%, 50%, 70% { transform: translateX(-4px); } 40%, 60% { transform: translateX(4px); } }
    </style>
</head>
<body>

    <div class="bg-wrapper"></div>
    <div class="overlay"></div>

    <div class="login-card">
        <div class="logo">Filmoloji</div>
        <h2>Güvenli Erişim</h2>

        <div class="input-group">
            <input type="password" id="passwordInput" class="custom-input" placeholder="Parola" onkeyup="if(event.key === 'Enter') tryLogin()">
            <i class="fas fa-lock input-icon"></i>
        </div>

        <button class="btn-submit" onclick="tryLogin()">Giriş Yap</button>
        
        <div class="error-text" id="errorMsg">Hatalı parola, lütfen tekrar deneyin.</div>

        <a href="index.html" class="back-link">Siteye Geri Dön</a>
    </div>

    <script>
        function tryLogin() {
            const input = document.getElementById('passwordInput');
            const error = document.getElementById('errorMsg');
            const btn = document.querySelector('.btn-submit');

            // auth.js içindeki merkezi kontrolü çağır
            const result = performLogin(input.value);

            if (result.success) {
                // BAŞARILI
                btn.innerHTML = '<i class="fas fa-check"></i> Başarılı';
                btn.style.background = '#46d369';
                error.classList.remove('visible');
                
                setTimeout(() => {
                    window.location.href = result.redirect;
                }, 600);
            } else {
                // HATALI
                input.classList.add('shake');
                error.classList.add('visible');
                input.value = '';
                input.focus();

                setTimeout(() => {
                    input.classList.remove('shake');
                }, 400);
            }
        }
    </script>

</body>
</html>
