<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Filmoloji Premium Giriş</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="/manifest.json">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { performLogin } from 'auth.js'; 

        // SİZİN FIREBASE YAPILANDIRMANIZ
        const firebaseConfig = {
            apiKey: "AIzaSyBIV0-Jzy0m4OoP6YX_L6El6x5e7YmlD8Y",
            authDomain: "filmoloji-web.firebaseapp.com",
            databaseURL: "https://filmoloji-web-default-rtdb.firebaseio.com",
            projectId: "filmoloji-web",
            storageBucket: "filmoloji-web.firebasestorage.app",
            messagingSenderId: "904158206710",
            appId: "1:904158206710:web:614592033008ff6f286ad7",
            measurementId: "G-LLYDE3XLZZ"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app); 

        // auth ve performLogin fonksiyonlarını global alana bağlama
        window.auth = auth; 
        window.performLogin = performLogin; 
    </script>

    <style>
        /* Buzlu Cam (Frosted Glass) ve Koyu Tema Stil */
        :root {
            --brand-red: #E50914; 
            --altin-rengi: #FFD700; 
            --card-bg-color: rgba(255, 255, 255, 0.15); 
            --input-bg-color: rgba(255, 255, 255, 0.1); 
            --bg-start: #0a0a0a; 
            --bg-end: #1a1a1a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'SF Pro Display', 'Segoe UI', sans-serif; }
        
        body {
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
            background: linear-gradient(to bottom, var(--bg-start), var(--bg-end)); 
        }
        
        .bg-wrapper { display: none; }
        
        .login-card {
            z-index: 10; width: 90%; max-width: 350px; padding: 40px 30px;
            
            background: var(--card-bg-color); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); 
            text-align: center;
        }

        /* BAŞLIK (ALTIN RENGİ) */
        h1 { 
            color: var(--altin-rengi); 
            margin-bottom: 40px; font-size: 1.8rem; font-weight: 700; 
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 0 0 5px rgba(0, 0, 0, 0.9);
        }

        .input-group {
            margin-bottom: 25px; position: relative;
        }

        .custom-input {
            width: 100%; padding: 12px 15px; 
            background: var(--input-bg-color); 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 8px; 
            font-size: 1rem;
            transition: all 0.3s;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
            text-align: left; 
        }
        .custom-input::placeholder {
            color: #777;
        }
        .custom-input:focus {
            border-color: var(--brand-red);
            background: rgba(255, 255, 255, 0.25);
        }

        .input-label {
            display: block;
            text-align: left;
            font-size: 0.9rem;
            color: white; 
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .utility-links {
            display: flex; 
            justify-content: flex-start; 
            margin-bottom: 30px; 
            font-size: 0.9rem;
        }
        .utility-links a { color: var(--brand-red); text-decoration: none; font-weight: 600; transition: 0.2s; margin-right: 20px;}
        .utility-links a:hover { text-decoration: underline; }

        .btn-submit {
            width: 100%; padding: 12px; 
            background: var(--brand-red); 
            color: white; 
            border: none; border-radius: 8px; 
            font-size: 1.1rem; font-weight: bold;
            cursor: pointer; margin-top: 20px; transition: background 0.3s, transform 0.1s;
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.5);
        }
        .btn-submit:hover { background: #ff0a16; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(229, 9, 20, 0.7); }
        .btn-submit:active { transform: scale(0.98); }

        .premium-link-footer {
            margin-top: 30px; font-size: 0.9rem; 
        }
        .premium-link-footer a { color: var(--altin-rengi); text-decoration: none; font-weight: 600; }
        .premium-link-footer a:hover { text-decoration: underline; }
        
        /* --- TOAST BİLDİRİM STİLLERİ --- */
        #toast-notification {
            position: fixed; bottom: 30px; left: 50%; 
            transform: translateX(-50%) translateY(100px); 
            background: var(--brand-red); 
            color: white; padding: 15px 30px; border-radius: 10px; 
            font-weight: 600; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 9999; opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: flex; align-items: center; gap: 10px;
        }

        #toast-notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="bg-wrapper"></div>
    
    <div class="login-card">
        <h1>Filmoloji Premium</h1>

        <div class="input-group">
            <div class="input-label">Kullanıcı Adı</div>
            <input type="text" id="usernameInput" class="custom-input" required placeholder=" " onkeypress="if(event.key==='Enter') tryLogin()">
        </div>

        <div class="input-group">
            <div class="input-label">Şifre</div>
            <input type="password" id="passwordInput" class="custom-input" required placeholder=" " onkeypress="if(event.key==='Enter') tryLogin()">
        </div>

        
        <button class="btn-submit" onclick="tryLogin()">Giriş Yap</button>
        
        
        <div class="premium-link-footer">
            <a href="premiumal.html">Premium Al</a>
        </div>
    </div>

    <div id="toast-notification" role="alert" aria-live="assertive"></div>

    <script>
        /* KODUNUZUN İÇİNE EKLEYİNİZ */

// Sağ Tık Menüsünü Engelleme
document.addEventListener('contextmenu', event => {
    event.preventDefault();
    showToast("Bu içerik telif hakları ile korunmaktadır."); // Mevcut toast fonksiyonunu kullanma
});

// F12 ve Diğer Kısayolları Engelleme (Windows/Linux için)
document.onkeydown = function(e) {
    // F12 tuşu
    if (e.key === 'F12' || e.keyCode == 123) {
        event.preventDefault();
        showToast("Geliştirici araçları engellendi!");
        return false;
    }
    // Ctrl+Shift+I (Inceleme), Ctrl+Shift+J (Konsol), Ctrl+Shift+C (Öğe Seçici)
    if (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) {
        event.preventDefault();
        showToast("Geliştirici araçları engellendi!");
        return false;
    }
    // Ctrl+S (Kaydet)
    if (e.ctrlKey && e.keyCode == 83) {
        event.preventDefault();
        showToast("Kaydetme işlemi engellendi!");
        return false;
    }
    // Ctrl+U (Sayfa Kaynağını Görüntüle)
    if (e.ctrlKey && e.keyCode == 85) {
        event.preventDefault();
        showToast("Sayfa kaynağına erişim engellendi!");
        return false;
    }
    // Mac kullanıcıları için cmd tuşu
    if (e.metaKey && (e.keyCode == 73 || e.keyCode == 83 || e.keyCode == 85)) {
        event.preventDefault();
        showToast("İzin verilmeyen işlem!");
        return false;
    }
};  
        // --- TOAST FONKSİYONU ---
        function showToast(message) {
            const toast = document.getElementById('toast-notification');
            toast.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
            toast.classList.add('show');
            
            // 4 saniye sonra bildirimi gizle
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }
        
        // PWA ve tryLogin fonksiyonları
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('PWA ServiceWorker kaydı başarılı.');
                    })
                    .catch(err => {
                        console.log('PWA ServiceWorker kaydı başarısız:', err);
                    });
            });
        }
        
        async function tryLogin() {
            const usernameInput = document.getElementById('usernameInput');
            const passwordInput = document.getElementById('passwordInput');

            const btn = document.querySelector('.btn-submit');

            if (typeof window.performLogin === 'undefined') {
                 showToast("Sistem Hatası: Giriş mekanizması yüklenemedi.");
                return;
            }

            // Firebase doğrulaması için performLogin'i çağır
            const result = await window.performLogin(usernameInput.value, passwordInput.value);

            if (result.success) {
                // BAŞARILI
                btn.innerHTML = '<i class="fas fa-check"></i> Başarılı';
                btn.style.background = '#46d369';
                
                setTimeout(() => {
                    window.location.href = result.redirect; 
                }, 600);
            } else {
                // HATALI
                showToast("Giriş başarısız. Lütfen bilgilerinizi kontrol edin.");
                
                // Hata bildirimi varken input alanını tekrar boşalt ve salla
                passwordInput.classList.add('shake');
                passwordInput.value = '';
                passwordInput.focus();

                setTimeout(() => {
                    passwordInput.classList.remove('shake');
                }, 400);
            }
        }
    </script>

</body>
</html>
