<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Filmoloji Şifre Sıfırlama (Kullanıcı Adı ile)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="manifest" href="/manifest.json">

    <script type="module">
        // Firebase Modüllerini İçe Aktar
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        
        // 🔥 SİZİN FIREBASE YAPILANDIRMANIZI BURAYA YAPIŞTIRIN 🔥
        const firebaseConfig = {
            apiKey: "AIzaSyBIV0-Jzy0m4OoP6YX_L6El6x5e7YmlD8Y", // Lütfen Kendi API Anahtarınızla Değiştirin
            authDomain: "filmoloji-web.firebaseapp.com",
            databaseURL: "https://filmoloji-web-default-rtdb.firebaseio.com",
            projectId: "filmoloji-web",
            storageBucket: "filmoloji-web.firebasestorage.app",
            messagingSenderId: "904158206710",
            appId: "1:904158206710:web:614592033008ff6f286ad7",
            measurementId: "G-LLYDE3XLZZ"
        };
        
        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app); 
        window.sendPasswordResetEmail = sendPasswordResetEmail; 
        window.DOMAIN_SUFFIX = "@filmoloji.com"; // Kullanıcı Adına Eklenecek Alan Adı
    </script>

    <style>
        /* --- KOPYALADIĞINIZ CSS STİLLERİ BURADA BAŞLIYOR --- */
        :root {
            --brand-red: #E50914; 
            --altin-rengi: #FFD700; 
            --card-bg-color: rgba(255, 255, 255, 0.15); 
            --input-bg-color: rgba(255, 255, 255, 0.1); 
            --bg-start: #0a0a0a; 
            --bg-end: #1a1a1a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'SF Pro Display', 'Segoe UI', sans-serif; }
        
        body {
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
            background: linear-gradient(to bottom, var(--bg-start), var(--bg-end)); 
        }
        
        .bg-wrapper { display: none; }
        
        .login-card {
            z-index: 10; width: 90%; max-width: 350px; padding: 40px 30px;
            background: var(--card-bg-color); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); 
            text-align: center;
        }

        h1 { 
            color: var(--altin-rengi); 
            margin-bottom: 40px; font-size: 1.8rem; font-weight: 700; 
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 0 0 5px rgba(0, 0, 0, 0.9);
        }

        .input-group { margin-bottom: 25px; position: relative; }

        .custom-input {
            width: 100%; padding: 12px 15px; 
            background: var(--input-bg-color); 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 8px; 
            font-size: 1rem;
            transition: all 0.3s;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
            text-align: left; 
        }
        .custom-input::placeholder { color: #777; }
        .custom-input:focus {
            border-color: var(--brand-red);
            background: rgba(255, 255, 255, 0.25);
        }

        .input-label {
            display: block;
            text-align: left;
            font-size: 0.9rem;
            color: white; 
            margin-bottom: 5px;
            font-weight: 500;
        }
        
        .btn-submit {
            width: 100%; padding: 12px; 
            background: var(--brand-red); 
            color: white; 
            border: none; border-radius: 8px; 
            font-size: 1.1rem; font-weight: bold;
            cursor: pointer; margin-top: 20px; transition: background 0.3s, transform 0.1s;
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.5);
        }
        .btn-submit:hover { background: #ff0a16; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(229, 9, 20, 0.7); }
        .btn-submit:active { transform: scale(0.98); }

        .premium-link-footer { margin-top: 30px; font-size: 0.9rem; }
        .premium-link-footer a { color: var(--altin-rengi); text-decoration: none; font-weight: 600; }
        .premium-link-footer a:hover { text-decoration: underline; }
        
        /* --- TOAST BİLDİRİM STİLLERİ --- */
        #toast-notification {
            position: fixed; bottom: 30px; left: 50%; 
            transform: translateX(-50%) translateY(100px); 
            background: var(--brand-red); 
            color: white; padding: 15px 30px; border-radius: 10px; 
            font-weight: 600; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 9999; opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            display: flex; align-items: center; gap: 10px;
        }

        #toast-notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .shake {
            animation: shake 0.4s;
        }
        /* --- KOPYALADIĞINIZ CSS STİLLERİ BURADA SONA ERİYOR --- */
    </style>
</head>
<body>
    <div class="bg-wrapper"></div>
    
    <div class="login-card">
        <h1>Şifremi Unuttum</h1>

        <div class="input-group">
            <div class="input-label">Kullanıcı Adı</div>
            <input type="text" id="usernameInput" class="custom-input" required placeholder="Örn: admin" onkeypress="if(event.key==='Enter') sendResetLink()">
        </div>
        
        <p style="color: #ccc; font-size: 0.85rem; margin-bottom: 20px; text-align: left;">
            Girdiğiniz kullanıcı adının sonuna otomatik olarak **@filmoloji.com** eklenecek ve sıfırlama bağlantısı o adrese gönderilecektir.
        </p>

        <button class="btn-submit" onclick="sendResetLink()">Sıfırlama Bağlantısı Gönder</button>
        
        
        <div class="premium-link-footer">
            <a href="login.html">Giriş Sayfasına Dön</a>
        </div>
    </div>

    <div id="toast-notification" role="alert" aria-live="assertive"></div>

    <script>
        // --- TOAST FONKSİYONU ---
        function showToast(message, isError = true) {
            const toast = document.getElementById('toast-notification');
            toast.innerHTML = isError 
                ? `<i class="fas fa-exclamation-circle"></i> ${message}`
                : `<i class="fas fa-check-circle"></i> ${message}`;
            toast.style.background = isError ? 'var(--brand-red)' : '#46d369';
            
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 5000); 
        }
        
        // Firebase Şifre Sıfırlama Fonksiyonu (Kullanıcı Adı Dönüşümü ile)
        async function sendResetLink() {
            const usernameInput = document.getElementById('usernameInput');
            const username = usernameInput.value.trim();
            const btn = document.querySelector('.btn-submit');
            
            // Buton durumunu sıfırla
            btn.innerHTML = 'Sıfırlama Bağlantısı Gönder';
            btn.style.background = 'var(--brand-red)';

            if (!username) {
                showToast("Lütfen kullanıcı adınızı girin.");
                usernameInput.classList.add('shake');
                usernameInput.focus();
                setTimeout(() => usernameInput.classList.remove('shake'), 400);
                return;
            }

            // Kullanıcı Adını E-postaya Dönüştürme
            const email = username + window.DOMAIN_SUFFIX;
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Gönderiliyor...';

            try {
                // Firebase API çağrısı
                await window.sendPasswordResetEmail(window.auth, email);

                // BAŞARILI DURUM (Güvenli Geri Bildirim)
                const successMessage = `Şifre sıfırlama bağlantısı, ${email} adresine gönderildi. Lütfen gelen kutunuzu/spam klasörünü kontrol edin.`;
                
                btn.innerHTML = '<i class="fas fa-check"></i> Bağlantı Gönderildi!';
                btn.style.background = '#46d369';
                showToast(successMessage, false); // false = Başarı mesajı

            } catch (error) {
                // HATA DURUMU
                console.error("Şifre sıfırlama hatası:", error.code, error.message);

                // Kullanıcı numaralandırmasını önlemek için (user-not-found) başarılı gibi davranma.
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-email') {
                    // Kullanıcıya yine de başarılı mesajı gösterilir
                    const safeMessage = `Sıfırlama bağlantısı gönderildi (hesap kayıtlıysa). Lütfen ${email} adresini kontrol edin.`;
                    
                    btn.innerHTML = '<i class="fas fa-check"></i> Bağlantı Gönderildi!';
                    btn.style.background = '#46d369';
                    showToast(safeMessage, false); 
                    
                } else if (error.code === 'auth/too-many-requests') {
                    // Çok fazla deneme yapıldıysa
                    showToast("Çok fazla deneme yaptınız. Lütfen daha sonra tekrar deneyin.");
                    btn.innerHTML = 'Sıfırlama Bağlantısı Gönder';
                    btn.style.background = 'var(--brand-red)';
                    
                } else {
                    // Diğer Firebase hataları (API anahtarı yanlış, ağ sorunu vb.)
                    showToast(`Genel bir hata oluştu. Hata kodu: ${error.code}. Lütfen konsolu kontrol edin.`);
                    btn.innerHTML = 'Sıfırlama Bağlantısı Gönder';
                    btn.style.background = 'var(--brand-red)';
                }

                usernameInput.classList.add('shake');
                setTimeout(() => usernameInput.classList.remove('shake'), 400);

            } finally {
                // Butonu eski haline döndürme
                setTimeout(() => {
                    btn.disabled = false;
                    // Eğer butonda yeşil 'Bağlantı Gönderildi' yazısı yoksa (yani hata oluştuysa), eski haline getir.
                    if (btn.innerHTML.includes('Bağlantı Gönderildi!')) {
                       // Yeşil kalmasına izin ver, ardından eski haline getir
                       setTimeout(() => {
                            btn.innerHTML = 'Sıfırlama Bağlantısı Gönder';
                            btn.style.background = 'var(--brand-red)';
                       }, 2000);
                    } else {
                        btn.innerHTML = 'Sıfırlama Bağlantısı Gönder';
                        btn.style.background = 'var(--brand-red)';
                    }
                }, 500); 
            }
        }
    </script>
</body>
</html>
