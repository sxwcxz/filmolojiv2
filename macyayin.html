<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sineo</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Archivo+Black&display=swap" rel="stylesheet">
    <!-- HLS.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --primary: #e50914; /* Kırmızı vurgu rengi */
            --bg-glass: rgba(15, 15, 15, 0.6);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        #player-wrapper {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            width: 100%; height: 100%;
            object-fit: contain;
            cursor: pointer;
        }

        /* sineo Logosu */
        .brand-logo {
            position: absolute;
            top: 40px;
            left: 50px;
            color: #fff; /* Görseldeki gibi beyaz renk */
            font-family: 'Archivo Black', sans-serif;
            font-size: 52px; /* Daha belirgin boyut */
            font-weight: 900; /* Ekstra kalın */
            letter-spacing: -3px; /* Harfleri sıkıştırarak bitişik hissi ver */
            z-index: 20;
            text-shadow: 0 4px 20px rgba(0,0,0,0.8);
            transition: opacity 0.5s ease;
            user-select: none;
            pointer-events: none;
            line-height: 1; /* Alt/Üst boşluğu sıfırla */
        }

        /* Video Üzeri Karartma ve Efektler */
        .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 40%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* Merkez Oynat Butonu ve Yükleniyor */
        .center-action {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 80px; height: 80px;
            background: var(--bg-glass);
            border-radius: 50%;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .center-action:hover {
            transform: scale(1.1);
            background: rgba(229, 9, 20, 0.8);
        }

        .center-action svg {
            width: 40px; height: 40px;
            fill: #fff;
            margin-left: 5px;
        }

        /* Spinner (Yükleniyor) */
        .spinner {
            display: none;
            width: 60px; height: 60px;
            border: 5px solid rgba(255,255,255,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: absolute;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Alt Kontrol Çubuğu (Glassmorphism) */
        .controls-container {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 1200px;
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .controls-left, .controls-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* İkonlar ve Butonlar */
        button {
            background: none; border: none;
            cursor: pointer; padding: 0;
            display: flex; align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.15); }
        button svg { width: 28px; height: 28px; fill: #fff; transition: fill 0.3s; }
        button:hover svg { fill: var(--primary); }

        /* Ses Kontrolü */
        .volume-container { display: flex; align-items: center; gap: 10px; }
        input[type="range"] {
            -webkit-appearance: none;
            width: 80px; height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px; outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            background: #fff; border-radius: 50%;
            transition: background 0.3s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { background: var(--primary); }

        /* Canlı Yayın Rozeti */
        .live-badge {
            display: flex; align-items: center; gap: 8px;
            color: #fff; font-weight: 600; font-size: 14px;
            letter-spacing: 1px;
            user-select: none;
        }
        .live-dot {
            width: 10px; height: 10px;
            background-color: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(229, 9, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0); }
        }

        /* Kalite Seçici Özel Tasarım */
        select {
            appearance: none;
            background: rgba(255,255,255,0.1);
            color: #fff; font-family: 'Poppins', sans-serif;
            font-size: 14px; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 30px 8px 15px;
            border-radius: 8px; outline: none; cursor: pointer;
            transition: all 0.3s;
        }
        select:hover { background: rgba(255,255,255,0.2); }
        select option { background: #1a1a1a; color: #fff; }

        /* Menü ve Logo Gizleme Sınıfı */
        .hide-ui .controls-container { opacity: 0; transform: translate(-50%, 20px); pointer-events: none; }
        .hide-ui .overlay { opacity: 0; }
        .hide-ui .brand-logo { opacity: 0; }
        .hide-ui .center-action { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="player-wrapper">
        <video id="video-player" playsinline></video>
        
        <div class="overlay"></div>

        <!-- sineo Logosu -->
        <div class="brand-logo">SINEO.</div>

        <!-- Yükleniyor / Ortadaki Play Butonu -->
        <div class="spinner" id="spinner"></div>
        <div class="center-action" id="center-play">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>

        <!-- Modern Kontrol Barı -->
        <div class="controls-container" id="controls">
            <div class="controls-left">
                <button id="play-pause-btn">
                    <!-- Play İkonu (Varsayılan) -->
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <!-- Pause İkonu (Gizli) -->
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>

                <div class="volume-container">
                    <button id="mute-btn">
                        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    </button>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
                </div>

                <div class="live-badge">
                    <div class="live-dot"></div> CANLI
                </div>
            </div>

            <div class="controls-right">
                <!-- Kalite Seçimi (Sadece Çoklu Kalite Varsa Görünür) -->
                <select id="quality-selector" style="display: none;"></select>

                <button id="fullscreen-btn">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const playerWrapper = document.getElementById('player-wrapper');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const centerPlay = document.getElementById('center-play');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const muteBtn = document.getElementById('mute-btn');
        const volumeSlider = document.getElementById('volume-slider');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const qualitySelector = document.getElementById('quality-selector');
        const spinner = document.getElementById('spinner');
        
        const streamUrl = 'https://tv-trt1.medya.trt.com.tr/master.m3u8';
        let hideTimer;

        // --- HLS YÜKLEME VE KALİTE AYARLARI ---
        if (Hls.isSupported()) {
            const hls = new Hls({ maxBufferLength: 30 });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                const levels = hls.levels;
                if (levels.length > 1) {
                    qualitySelector.style.display = 'block';
                    qualitySelector.innerHTML = '<option value="-1">Otomatik Kalite</option>';
                    levels.forEach((level, index) => {
                        const opt = document.createElement('option');
                        opt.value = index;
                        opt.textContent = `${level.height}p`;
                        qualitySelector.appendChild(opt);
                    });
                    qualitySelector.addEventListener('change', (e) => {
                        hls.currentLevel = parseInt(e.target.value);
                    });
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = streamUrl;
        }

        // --- OYNAT / DURAKLAT MANTIĞI ---
        function togglePlay() {
            if (video.paused) {
                video.play();
            } else {
                video.pause();
            }
        }

        playPauseBtn.addEventListener('click', togglePlay);
        centerPlay.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);

        video.addEventListener('play', () => {
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
            centerPlay.style.display = 'none';
        });

        video.addEventListener('pause', () => {
            iconPlay.style.display = 'block';
            iconPause.style.display = 'none';
            centerPlay.style.display = 'flex';
        });

        // --- YÜKLENİYOR (BUFFERING) ANİMASYONU ---
        video.addEventListener('waiting', () => {
            spinner.style.display = 'block';
            centerPlay.style.display = 'none';
        });
        video.addEventListener('playing', () => {
            spinner.style.display = 'none';
        });

        // --- SES KONTROLÜ ---
        volumeSlider.addEventListener('input', (e) => {
            video.volume = e.target.value;
            video.muted = video.volume === 0;
        });

        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            volumeSlider.value = video.muted ? 0 : video.volume;
        });

        // --- TAM EKRAN (FULLSCREEN) ---
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                playerWrapper.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        });

        // --- UI GİZLEME (FARE HAREKETSİZLİĞİ) ---
        function hideUI() {
            if (!video.paused) playerWrapper.classList.add('hide-ui');
        }

        function resetTimer() {
            playerWrapper.classList.remove('hide-ui');
            clearTimeout(hideTimer);
            hideTimer = setTimeout(hideUI, 3000); // 3 saniye sonra menüyü gizle
        }

        playerWrapper.addEventListener('mousemove', resetTimer);
        playerWrapper.addEventListener('mouseleave', hideUI);
        
        // Başlangıçta timer'ı başlat
        resetTimer();
    </script>
</body>
</html>
