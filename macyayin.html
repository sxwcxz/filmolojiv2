<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sineo Modern Oynatıcı</title>
    
    <!-- Google Fonts: Arayüz için Poppins, Logo için Archivo Black -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Archivo+Black&display=swap" rel="stylesheet">
    
    <!-- HLS.js (M3U8 Oynatma Motoru) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Mobilde dokunma mavisini engeller */
        }

        :root {
            --primary: #e50914; /* Kırmızı vurgu rengi */
            --bg-glass: rgba(15, 15, 15, 0.6);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Taşmaları engeller */
        }

        #player-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        video {
            width: 100%; height: 100%;
            object-fit: contain;
            cursor: pointer;
        }

        /* "SINEO." Özel Logosu */
        .brand-logo {
            position: absolute;
            top: clamp(15px, 4vw, 35px);
            left: clamp(20px, 5vw, 45px);
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(24px, 5vw, 52px);
            color: #fff;
            letter-spacing: -2px; /* Harfleri sıkıştır */
            line-height: 1;
            z-index: 20;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
            transition: opacity 0.5s ease;
            pointer-events: none;
            user-select: none;
        }

        /* Video Üzeri Karartma (Alt kısım) */
        .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        /* Merkez Oynat Butonu ve Yükleniyor */
        .center-action {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            width: clamp(60px, 10vw, 80px);
            height: clamp(60px, 10vw, 80px);
            background: var(--bg-glass);
            border-radius: 50%;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 15;
        }

        .center-action:hover {
            transform: scale(1.1);
            background: rgba(229, 9, 20, 0.8);
        }

        .center-action svg {
            width: 50%; height: 50%;
            fill: #fff;
            margin-left: 5px; /* Play ikonunu hafif sağa ortala */
        }

        /* Spinner (Yükleniyor) */
        .spinner {
            display: none;
            width: clamp(50px, 8vw, 60px);
            height: clamp(50px, 8vw, 60px);
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: absolute;
            z-index: 15;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Alt Kontrol Çubuğu (Glassmorphism) */
        .controls-container {
            position: absolute;
            bottom: max(20px, env(safe-area-inset-bottom)); /* iPhone home bar koruması */
            left: 50%;
            transform: translateX(-50%);
            width: 95%; max-width: 1200px;
            background: var(--bg-glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 20;
            transition: opacity 0.5s ease, transform 0.5s ease;
            flex-wrap: nowrap; /* Asla alt satıra geçmesin */
            white-space: nowrap;
        }

        .controls-left, .controls-right {
            display: flex;
            align-items: center;
            gap: clamp(8px, 2vw, 20px); /* Ekran küçülünce boşluklar daralır */
        }

        /* İkonlar ve Butonlar */
        button {
            background: none; border: none;
            cursor: pointer; padding: 0;
            display: flex; align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.15); }
        button svg { 
            width: clamp(22px, 4vw, 28px); 
            height: clamp(22px, 4vw, 28px); 
            fill: #fff; 
            transition: fill 0.3s; 
        }
        button:hover svg { fill: var(--primary); }

        /* Ses Kontrolü */
        .volume-container { display: flex; align-items: center; gap: 10px; }
        input[type="range"] {
            -webkit-appearance: none;
            width: clamp(50px, 8vw, 80px); 
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px; outline: none;
            cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            background: #fff; border-radius: 50%;
            transition: background 0.3s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { background: var(--primary); }

        /* Canlı Yayın Rozeti */
        .live-badge {
            display: flex; align-items: center; gap: 6px;
            color: #fff; font-weight: 600; 
            font-size: clamp(12px, 2.5vw, 14px);
            letter-spacing: 1px;
            user-select: none;
        }
        .live-dot {
            width: 8px; height: 8px;
            background-color: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0.7); }
            70% { box-shadow: 0 0 0 8px rgba(229, 9, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 9, 20, 0); }
        }

        /* Kalite Seçici */
        select {
            appearance: none;
            background: rgba(255,255,255,0.1);
            color: #fff; font-family: 'Poppins', sans-serif;
            font-size: clamp(11px, 2.5vw, 14px); font-weight: 600;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 10px;
            border-radius: 8px; outline: none; cursor: pointer;
            text-align: center;
            max-width: 90px;
            transition: all 0.3s;
        }
        select:hover { background: rgba(255,255,255,0.2); }
        select option { background: #1a1a1a; color: #fff; }

        /* Menü Gizleme (Fare/Dokunma Hareketsizliğinde) */
        .hide-ui .controls-container { opacity: 0; transform: translate(-50%, 20px); pointer-events: none; }
        .hide-ui .overlay { opacity: 0; }
        .hide-ui .brand-logo { opacity: 0; }
        .hide-ui .center-action { opacity: 0; pointer-events: none; }

        /* MOBİL CİHAZ UYUMLULUĞU */
        @media (max-width: 768px) {
            /* Telefonlarda fiziksel tuşlar kullanıldığı için ses çubuğunu gizle */
            #volume-slider { display: none; }
            .controls-container { width: 98%; padding: 8px 10px; }
        }

        @media (max-width: 480px) {
            /* Çok küçük ekranlarda "CANLI" yazısını gizle, sadece kırmızı nokta kalsın */
            .live-badge span { display: none; }
        }
    </style>
</head>
<body>

    <div id="player-wrapper">
        <!-- Özel Logo -->
        <div class="brand-logo">SINEO.</div>

        <video id="video-player" playsinline></video>
        
        <div class="overlay"></div>

        <!-- Merkez Oynatma ve Yükleniyor -->
        <div class="spinner" id="spinner"></div>
        <div class="center-action" id="center-play">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>

        <!-- Alt Kontrol Çubuğu -->
        <div class="controls-container" id="controls">
            <div class="controls-left">
                <!-- Oynat/Duraklat Butonları -->
                <button id="play-pause-btn">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>

                <!-- Ses Butonu ve Çubuğu -->
                <div class="volume-container">
                    <button id="mute-btn">
                        <!-- Ses Açık İkonu -->
                        <svg id="icon-vol-on" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                        <!-- Ses Kapalı İkonu -->
                        <svg id="icon-vol-off" viewBox="0 0 24 24" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                    </button>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
                </div>

                <div class="live-badge">
                    <div class="live-dot"></div> <span>CANLI</span>
                </div>
            </div>

            <div class="controls-right">
                <!-- Kalite Seçici (Gerektiğinde Görünür) -->
                <select id="quality-selector" style="display: none;"></select>

                <!-- Tam Ekran Butonu -->
                <button id="fullscreen-btn">
                    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video-player');
        const playerWrapper = document.getElementById('player-wrapper');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const centerPlay = document.getElementById('center-play');
        const iconPlay = document.getElementById('icon-play');
        const iconPause = document.getElementById('icon-pause');
        const muteBtn = document.getElementById('mute-btn');
        const iconVolOn = document.getElementById('icon-vol-on');
        const iconVolOff = document.getElementById('icon-vol-off');
        const volumeSlider = document.getElementById('volume-slider');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const qualitySelector = document.getElementById('quality-selector');
        const spinner = document.getElementById('spinner');
        
        const streamUrl = 'https://tv-trt1.medya.trt.com.tr/master.m3u8';
        let hideTimer;

        // --- HLS YÜKLEME VE KALİTE MENÜSÜ ---
        if (Hls.isSupported()) {
            const hls = new Hls({ maxBufferLength: 30 });
            hls.loadSource(streamUrl);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, function () {
                const levels = hls.levels;
                if (levels.length > 1) {
                    qualitySelector.style.display = 'block';
                    qualitySelector.innerHTML = '<option value="-1">Oto</option>';
                    levels.forEach((level, index) => {
                        const opt = document.createElement('option');
                        opt.value = index;
                        opt.textContent = `${level.height}p`;
                        qualitySelector.appendChild(opt);
                    });
                    qualitySelector.addEventListener('change', (e) => {
                        hls.currentLevel = parseInt(e.target.value);
                    });
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari ve iPhone için doğrudan oynatma (iOS kaliteleri kendi içinde ayarlar)
            video.src = streamUrl;
        }

        // --- OYNAT / DURAKLAT ---
        function togglePlay() {
            if (video.paused) video.play();
            else video.pause();
        }

        playPauseBtn.addEventListener('click', togglePlay);
        centerPlay.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);

        video.addEventListener('play', () => {
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
            centerPlay.style.display = 'none';
        });

        video.addEventListener('pause', () => {
            iconPlay.style.display = 'block';
            iconPause.style.display = 'none';
            centerPlay.style.display = 'flex';
        });

        // --- YÜKLENİYOR (BUFFERING) ---
        video.addEventListener('waiting', () => {
            spinner.style.display = 'block';
            centerPlay.style.display = 'none';
        });
        video.addEventListener('playing', () => spinner.style.display = 'none');

        // --- SES KONTROLÜ ---
        function updateVolumeIcons() {
            if(video.muted || video.volume === 0) {
                iconVolOn.style.display = 'none';
                iconVolOff.style.display = 'block';
            } else {
                iconVolOn.style.display = 'block';
                iconVolOff.style.display = 'none';
            }
        }

        volumeSlider.addEventListener('input', (e) => {
            video.volume = e.target.value;
            video.muted = video.volume == 0;
            updateVolumeIcons();
        });

        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            if(!video.muted && video.volume === 0) video.volume = 1;
            volumeSlider.value = video.muted ? 0 : video.volume;
            updateVolumeIcons();
        });

        // --- TAM EKRAN (iOS Destekli) ---
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (playerWrapper.requestFullscreen) {
                    playerWrapper.requestFullscreen();
                } else if (playerWrapper.webkitRequestFullscreen) {
                    playerWrapper.webkitRequestFullscreen(); // PC Safari
                } else if (video.webkitEnterFullscreen) {
                    video.webkitEnterFullscreen(); // iOS (iPhone) Video Oynatıcısı
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        });

        // --- UI GİZLEME VE GÖSTERME (Fare & Dokunma) ---
        function hideUI() {
            if (!video.paused) playerWrapper.classList.add('hide-ui');
        }

        function resetTimer() {
            playerWrapper.classList.remove('hide-ui');
            clearTimeout(hideTimer);
            hideTimer = setTimeout(hideUI, 3000); // 3 sn sonra gizle
        }

        // Bilgisayar için fare etkinlikleri
        playerWrapper.addEventListener('mousemove', resetTimer);
        playerWrapper.addEventListener('mouseleave', hideUI);
        
        // Mobil için dokunmatik ekran etkinlikleri
        playerWrapper.addEventListener('touchstart', resetTimer);
        
        // Başlangıç tetiklemesi
        resetTimer();
    </script>
</body>
</html>
